<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Arena Network</title>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0B1D3A;--navy2:#091730;--navy3:#071225;--gold:#C8993C;--cream:#FAF6EF;--rust:#9B4D2B;--sage:#5A7247;--slate:#3C5A8A;--r:10px}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--navy2);color:var(--cream);-webkit-text-size-adjust:100%}
h1,h2,h3{font-family:'Bitter',Georgia,serif}
a{text-decoration:none;color:inherit}
.side{display:none}.drawer-bg{display:none;position:fixed;inset:0;background:rgba(7,18,37,.6);z-index:40}.drawer-bg.on{display:block}
.drawer{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--navy3);z-index:50;transform:translateX(-100%);transition:transform .3s}.drawer.on{transform:translateX(0)}
.drawer-hdr{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid rgba(200,153,60,.08)}
.drawer-hdr span{font-family:'Bitter',serif;font-weight:700;color:var(--gold);font-size:14px}
.drawer-x{width:36px;height:36px;border-radius:8px;background:var(--navy);display:flex;align-items:center;justify-content:center;border:0;cursor:pointer;color:rgba(250,246,239,.3)}
.drawer-x svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.drawer nav{padding:12px}.drawer nav a{display:block;padding:12px;border-radius:8px;font-size:13px;font-weight:600;color:rgba(250,246,239,.35);margin-bottom:2px}.drawer nav a.on{color:var(--gold);background:rgba(200,153,60,.08)}
.topbar{height:56px;background:var(--navy);border-bottom:1px solid rgba(200,153,60,.08);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.topbar h1{font-size:16px;font-weight:700}
.hbtn{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--navy2);border-radius:8px;border:0;cursor:pointer}
.hbtn svg{width:20px;height:20px;stroke:var(--gold);fill:none;stroke-width:2}
.wrap{padding:16px}
.srow{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px}
.sbox{background:var(--navy);border:1px solid rgba(200,153,60,.08);border-radius:var(--r);padding:14px;text-align:center}
.sbox b{display:block;font-family:'Bitter',serif;font-weight:800;font-size:22px;color:var(--gold);line-height:1}
.sbox small{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(250,246,239,.2);margin-top:3px;display:block}
.section{margin-bottom:20px}
.section h2{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(250,246,239,.3);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.section h2 a{font-size:11px;color:var(--gold);font-weight:600;text-transform:none;letter-spacing:0;padding:8px 14px;background:rgba(200,153,60,.08);border-radius:8px;min-height:44px;display:inline-flex;align-items:center}
.card{background:var(--navy);border:1px solid rgba(200,153,60,.08);border-radius:var(--r);padding:14px;margin-bottom:8px}
.card h3{font-size:14px;font-weight:700;margin-bottom:3px}
.card .meta{font-size:12px;color:rgba(250,246,239,.25)}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.badge-ok{background:rgba(90,114,71,.12);color:var(--sage)}.badge-pend{background:rgba(155,77,43,.12);color:var(--rust)}
.nav-cards{display:flex;flex-direction:column;gap:8px}
.ncard{display:flex;align-items:center;gap:12px;background:var(--navy);border:1px solid rgba(200,153,60,.08);border-radius:var(--r);padding:16px;min-height:56px}
.ncard .icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ncard .icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.ncard h3{font-size:14px;font-weight:700;flex:1}
.ncard .arrow{color:var(--gold);font-size:18px}
.empty{text-align:center;padding:24px;color:rgba(250,246,239,.1);font-size:12px}
.ft{background:var(--navy3);padding:20px 16px;text-align:center;margin-top:20px}
.ft .br{font-family:'Bitter',serif;font-weight:700;color:var(--gold);font-size:14px}
.ft .cp{font-size:10px;color:rgba(250,246,239,.08);margin-top:8px}

@media(min-width:640px){.srow{grid-template-columns:repeat(4,1fr)}.nav-cards{display:grid;grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){
  .hbtn{display:none}
  .side{display:flex;flex-direction:column;width:220px;flex-shrink:0;background:var(--navy3);border-right:1px solid rgba(200,153,60,.08);position:fixed;top:0;bottom:0;left:0;z-index:30}
  .side-hdr{height:56px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid rgba(200,153,60,.08)}
  .side-hdr a{display:flex;align-items:center;gap:8px}.side-hdr .si{width:28px;height:28px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center}
  .side-hdr .si svg{width:14px;height:14px;stroke:var(--navy);fill:none;stroke-width:2.2}.side-hdr span{font-family:'Bitter',serif;font-weight:700;color:var(--gold);font-size:13px}
  .side nav{padding:12px;flex:1}.side nav a{display:block;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:600;color:rgba(250,246,239,.3);margin-bottom:2px}
  .side nav a:hover{color:var(--gold);background:rgba(200,153,60,.05)}.side nav a.on{color:var(--gold);background:rgba(200,153,60,.08)}
  .side-ft{padding:12px;border-top:1px solid rgba(200,153,60,.08)}.side-ft a{font-size:11px;color:rgba(250,246,239,.2);padding:8px}
  .page{margin-left:220px}
}
</style>
</head>
<body>
<aside class="side"><div class="side-hdr"><a href="../index.html"><div class="si"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18"/></svg></div><span>ARENA NET</span></a></div><nav><a href="dashboard.html" class="on">Overview</a><a href="events.html">Events</a><a href="news.html">News</a><a href="analytics.html">Analytics</a></nav><div class="side-ft"><a href="../index.html">← Back to Site</a></div></aside>
<div class="drawer-bg" id="dbg" onclick="tog()"></div>
<div class="drawer" id="dw"><div class="drawer-hdr"><span>DASHBOARD</span><button class="drawer-x" onclick="tog()"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18 18 6M6 6l12 12"/></svg></button></div><nav><a href="dashboard.html" class="on">Overview</a><a href="events.html">Events</a><a href="news.html">News</a><a href="analytics.html">Analytics</a></nav></div>

<div class="page">
<div class="topbar"><div style="display:flex;align-items:center;gap:10px"><button class="hbtn" onclick="tog()"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg></button><h1>Dashboard</h1></div></div>
<div class="wrap">
  <div class="srow" id="stats"></div>

  <div class="section">
    <h2>Manage <a href="events.html">All Events →</a></h2>
    <div class="nav-cards">
      <a href="events.html" class="ncard"><div class="icon" style="background:rgba(200,153,60,.1);color:var(--gold)"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75"/></svg></div><h3>Event Manager</h3><span class="arrow">→</span></a>
      <a href="news.html" class="ncard"><div class="icon" style="background:rgba(90,114,71,.1);color:var(--sage)"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7.5h1.5m-1.5 3h1.5m-7.5 3h7.5m-7.5 3h7.5m3-9h3.375c.621 0 1.125.504 1.125 1.125V18a2.25 2.25 0 0 1-2.25 2.25M16.5 7.5V4.875c0-.621-.504-1.125-1.125-1.125H4.125C3.504 3.75 3 4.254 3 4.875V18a2.25 2.25 0 0 0 2.25 2.25h13.5"/></svg></div><h3>News Publisher</h3><span class="arrow">→</span></a>
      <a href="analytics.html" class="ncard"><div class="icon" style="background:rgba(60,90,138,.1);color:var(--slate)"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"/></svg></div><h3>Analytics</h3><span class="arrow">→</span></a>
      <a href="../index.html" class="ncard"><div class="icon" style="background:rgba(155,77,43,.1);color:var(--rust)"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18"/></svg></div><h3>Public Directory</h3><span class="arrow">→</span></a>
    </div>
  </div>

  <div class="section">
    <h2>Recent Events</h2>
    <div id="revents"></div>
  </div>

  <div class="section">
    <h2>Latest News</h2>
    <div id="rnews"></div>
  </div>
</div>
<div class="ft"><div class="br">Arena Network Dashboard</div><div class="cp">&copy; 2026 Arena Network</div></div>
</div>

<script>
function tog(){document.getElementById('dw').classList.toggle('on');document.getElementById('dbg').classList.toggle('on')}

(async function(){
  var[ar,ev,vn,nw]=await Promise.all([
    fetch('/api/arenas?limit=1').then(function(r){return r.json()}).catch(function(){return{total:0}}),
    fetch('/api/events?limit=5&approved=true').then(function(r){return r.json()}).catch(function(){return{events:[],total:0}}),
    fetch('/api/vendors?limit=1').then(function(r){return r.json()}).catch(function(){return{total:0}}),
    fetch('/api/news?limit=5&published=true').then(function(r){return r.json()}).catch(function(){return{news:[]}})
  ]);

  document.getElementById('stats').innerHTML=
    sb(ar.total||0,'Arenas')+sb(ev.total||0,'Events')+sb(vn.total||0,'Vendors')+sb((nw.news||[]).length,'News');

  var evts=ev.events||[];
  document.getElementById('revents').innerHTML=evts.length?evts.map(function(e){
    var d=e.start_date?new Date(e.start_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
    return '<div class="card"><h3>'+E(e.title)+'</h3><div class="meta">'+d+(e.arena_name?' · '+E(e.arena_name):'')+'</div></div>';
  }).join(''):'<div class="empty">No events</div>';

  var news=nw.news||[];
  document.getElementById('rnews').innerHTML=news.length?news.map(function(n){
    var d=n.publish_date?new Date(n.publish_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
    return '<div class="card"><h3>'+E(n.title)+'</h3><div class="meta">'+d+(n.arena_name?' · '+E(n.arena_name):'')+'</div></div>';
  }).join(''):'<div class="empty">No news</div>';
})();

function sb(v,l){return '<div class="sbox"><b>'+v+'</b><small>'+l+'</small></div>'}
function E(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
</script>
</body>
</html>
