<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Arena Network</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config={theme:{extend:{colors:{navy:{50:'#E8ECF2',100:'#C5CEE0',400:'#3C5A8A',500:'#0B1D3A',600:'#091730',700:'#071225'},gold:{50:'#FDF8EE',100:'#F9EDCC',300:'#E8C46D',400:'#C8993C',500:'#B5882F',600:'#9A7226'},cream:{50:'#FEFDFB',100:'#FAF6EF',200:'#F2EBE0',300:'#E8DFD0'},rust:{400:'#B85A3A',500:'#9B4D2B',600:'#7F3E22'},sage:{400:'#6D8A56',500:'#5A7247',600:'#4A5E3B'}},fontFamily:{display:['Bitter','Georgia','serif'],body:['DM Sans','system-ui','sans-serif']}}}}
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn .3s ease-out forwards}
        .mobile-drawer{transform:translateX(-100%);transition:transform .3s ease}.mobile-drawer.open{transform:translateX(0)}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#091730}::-webkit-scrollbar-thumb{background:#C8993C;border-radius:3px}
        .tier-platinum{background:#8B8BA7;color:#fff}.tier-gold{background:#C8993C;color:#0B1D3A}.tier-silver{background:#A8A8A8;color:#fff}.tier-bronze{background:#9B4D2B;color:#fff}
        textarea,input,select{font-family:'DM Sans',system-ui,sans-serif}
    </style>
</head>

<body class="bg-navy-600 text-cream-100 font-body min-h-screen">

<!-- ═══════════ LAYOUT SHELL ═══════════ -->
<div class="flex min-h-screen">

    <!-- ── SIDEBAR (desktop) ── -->
    <aside id="sidebar" class="hidden lg:flex flex-col w-60 flex-shrink-0 bg-navy-700 border-r border-gold-400/10">
        <!-- Logo -->
        <div class="h-16 flex items-center px-5 border-b border-gold-400/10">
            <a href="../index.html" class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-gold-400 flex items-center justify-center">
                    <svg class="w-4 h-4 text-navy-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg>
                </div>
                <span class="font-display font-700 text-gold-400 text-sm tracking-wide">ARENA NET</span>
            </a>
        </div>

        <!-- Nav items -->
        <nav class="flex-1 py-4 px-3 space-y-0.5 overflow-y-auto" id="desktopNav"></nav>

        <!-- Back to site -->
        <div class="p-3 border-t border-gold-400/10">
            <a href="../index.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-cream-300/40 hover:text-gold-400 hover:bg-gold-400/5 transition-all text-xs font-semibold">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
                Back to Site
            </a>
        </div>
    </aside>

    <!-- ── MOBILE DRAWER ── -->
    <div id="drawerBackdrop" class="fixed inset-0 bg-navy-700/60 z-40 hidden lg:hidden" onclick="toggleDrawer()"></div>
    <aside id="drawer" class="mobile-drawer fixed inset-y-0 left-0 w-64 bg-navy-700 z-50 lg:hidden flex flex-col">
        <div class="h-16 flex items-center justify-between px-5 border-b border-gold-400/10">
            <span class="font-display font-700 text-gold-400 text-sm tracking-wide">DASHBOARD</span>
            <button onclick="toggleDrawer()" class="w-8 h-8 rounded-lg bg-navy-500 flex items-center justify-center text-cream-300/40 hover:text-gold-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg></button>
        </div>
        <nav class="flex-1 py-4 px-3 space-y-0.5 overflow-y-auto" id="mobileNavItems"></nav>
    </aside>

    <!-- ── MAIN CONTENT ── -->
    <div class="flex-1 flex flex-col min-w-0">
        <!-- Top bar -->
        <header class="h-16 bg-navy-500 border-b border-gold-400/10 flex items-center justify-between px-4 sm:px-6 flex-shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleDrawer()" class="lg:hidden w-9 h-9 rounded-lg bg-navy-600 flex items-center justify-center text-gold-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
                </button>
                <h1 id="sectionTitle" class="font-display font-700 text-lg text-cream-100 truncate"></h1>
            </div>
            <a href="../index.html" class="hidden sm:inline-flex items-center gap-1.5 text-xs font-semibold text-cream-300/30 hover:text-gold-400 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
                View Site
            </a>
        </header>

        <!-- Content area -->
        <main id="mainContent" class="flex-1 overflow-y-auto p-4 sm:p-6 bg-navy-600"></main>
    </div>
</div>

<!-- ═══════════ JAVASCRIPT ═══════════ -->
<script>
const API = '';

// ════════════════════════════════════════════════
// NAV DEFINITION
// ════════════════════════════════════════════════
const NAV_ITEMS = [
    { id:'profile',   label:'Arena Profile', icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/>' },
    { id:'events',    label:'Event Manager', icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/>' },
    { id:'vendors',   label:'Vendor Manager', icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 0 1 .75-.75h3a.75.75 0 0 1 .75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349M3.75 21V9.349m0 0a3.001 3.001 0 0 0 3.75-.615A2.993 2.993 0 0 0 9.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 0 0 2.25 1.016c.896 0 1.7-.393 2.25-1.015a3.001 3.001 0 0 0 3.75.614m-16.5 0a3.004 3.004 0 0 1-.621-4.72l1.189-1.19A1.5 1.5 0 0 1 5.378 3h13.243a1.5 1.5 0 0 1 1.06.44l1.19 1.189a3 3 0 0 1-.621 4.72M6.75 18h3.75a.75.75 0 0 0 .75-.75V13.5a.75.75 0 0 0-.75-.75H6.75a.75.75 0 0 0-.75.75v3.75c0 .414.336.75.75.75Z"/>' },
    { id:'sponsors',  label:'Sponsor Manager', icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"/>' },
    { id:'news',      label:'News Publisher', icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M12 7.5h1.5m-1.5 3h1.5m-7.5 3h7.5m-7.5 3h7.5m3-9h3.375c.621 0 1.125.504 1.125 1.125V18a2.25 2.25 0 0 1-2.25 2.25M16.5 7.5V18a2.25 2.25 0 0 0 2.25 2.25M16.5 7.5V4.875c0-.621-.504-1.125-1.125-1.125H4.125C3.504 3.75 3 4.254 3 4.875V18a2.25 2.25 0 0 0 2.25 2.25h13.5"/>' },
    { id:'scraper',   label:'AI Scraper', icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 0 0-2.455 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z"/>' },
    { id:'analytics', label:'Analytics', icon:'<path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"/>' },
];

var activeSection = 'profile';
var arenasList = [];

// ════════════════════════════════════════════════
// BOOTSTRAP
// ════════════════════════════════════════════════
(async function boot() {
    buildNav();
    try { const r = await fetch(`/api/arenas?limit=200`); const d = await r.json(); arenasList = d.arenas||[]; } catch(e) { arenasList=[]; }
    navigateTo(location.hash.replace('#','') || 'profile');
})();

function buildNav() {
    const html = NAV_ITEMS.map(n => navBtn(n)).join('');
    document.getElementById('desktopNav').innerHTML = html;
    document.getElementById('mobileNavItems').innerHTML = html;
}

function navBtn(n) {
    return `<button onclick="navigateTo('${n.id}')" data-nav="${n.id}" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold transition-all text-cream-300/50 hover:text-gold-400 hover:bg-gold-400/5">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">${n.icon}</svg>
        <span class="truncate">${n.label}</span>
    </button>`;
}

function navigateTo(id) {
    if (!NAV_ITEMS.find(n=>n.id===id)) id='profile';
    activeSection = id;
    location.hash = id;
    const item = NAV_ITEMS.find(n=>n.id===id);
    document.getElementById('sectionTitle').textContent = item.label;

    // Highlight active nav
    document.querySelectorAll('.nav-btn').forEach(b => {
        const isActive = b.dataset.nav === id;
        b.classList.toggle('text-gold-400', isActive);
        b.classList.toggle('bg-gold-400/10', isActive);
        b.classList.toggle('text-cream-300/50', !isActive);
        b.classList.toggle('bg-gold-400/5', false);
    });

    // Close mobile drawer
    toggleDrawer(false);

    // Load section
    const loaders = { profile:loadProfile, events:loadEvents, vendors:loadVendors, sponsors:loadSponsors, news:loadNews, scraper:loadScraper, analytics:loadAnalytics };
    (loaders[id] || loadProfile)();
}

function toggleDrawer(forceState) {
    const drawer = document.getElementById('drawer');
    const backdrop = document.getElementById('drawerBackdrop');
    const isOpen = typeof forceState==='boolean' ? forceState : !drawer.classList.contains('open');
    drawer.classList.toggle('open', isOpen);
    backdrop.classList.toggle('hidden', !isOpen);
}

// ════════════════════════════════════════════════
// SHARED HELPERS
// ════════════════════════════════════════════════
const M = document.getElementById('mainContent');
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function cap(s){return s?s.split(/[\s-]+/).map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' '):''}
function card(content){return `<div class="bg-navy-500 rounded-xl border border-gold-400/10 p-5 sm:p-6 fade-in">${content}</div>`}
function hdr(title,btnHtml=''){return `<div class="flex items-center justify-between mb-5 flex-wrap gap-3"><h2 class="font-display font-700 text-lg text-cream-100">${title}</h2>${btnHtml}</div>`}
function empty(msg){return `<div class="text-center py-10 text-cream-300/20"><p class="text-sm">${msg}</p></div>`}
function badge(text,cls='bg-gold-400/15 text-gold-400'){return `<span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider ${cls}">${esc(text)}</span>`}
function inp(id,label,type='text',val='',extra=''){return `<div><label class="text-[10px] font-bold uppercase tracking-wider text-cream-300/30 mb-1 block">${label}</label><input id="${id}" type="${type}" value="${esc(val)}" class="w-full py-2 px-3 bg-navy-600 border border-gold-400/10 rounded-lg text-sm text-cream-100 placeholder:text-cream-300/20 focus:outline-none focus:border-gold-400/40 transition-colors" ${extra}></div>`}
function sel(id,label,options,val=''){return `<div><label class="text-[10px] font-bold uppercase tracking-wider text-cream-300/30 mb-1 block">${label}</label><select id="${id}" class="w-full py-2 px-3 bg-navy-600 border border-gold-400/10 rounded-lg text-sm text-cream-100 focus:outline-none focus:border-gold-400/40 appearance-none transition-colors" style="background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%228%22%3E%3Cpath d=%221 1l5 5 5-5%22 stroke=%22%23C8993C%22 stroke-width=%221.5%22 fill=%22none%22/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 12px center">${options.map(o=>`<option value="${esc(o.v)}" ${o.v===val?'selected':''}>${esc(o.l)}</option>`).join('')}</select></div>`}
function txta(id,label,val='',rows=4){return `<div><label class="text-[10px] font-bold uppercase tracking-wider text-cream-300/30 mb-1 block">${label}</label><textarea id="${id}" rows="${rows}" class="w-full py-2 px-3 bg-navy-600 border border-gold-400/10 rounded-lg text-sm text-cream-100 placeholder:text-cream-300/20 focus:outline-none focus:border-gold-400/40 resize-y transition-colors">${esc(val)}</textarea></div>`}
function btn(text,onclick,cls='bg-gold-400 hover:bg-gold-500 text-navy-500'){return `<button onclick="${onclick}" class="${cls} font-bold text-xs px-5 py-2.5 rounded-lg uppercase tracking-wider transition-colors">${text}</button>`}
function btnO(text,onclick){return btn(text,onclick,'border border-gold-400/20 text-gold-400/60 hover:text-gold-400 hover:border-gold-400/40 bg-transparent')}
function statBox(val,label){return `<div class="bg-navy-600 rounded-xl p-4 text-center border border-gold-400/5"><div class="font-display font-800 text-2xl text-gold-400 leading-none">${val}</div><div class="text-[10px] font-semibold uppercase tracking-wider text-cream-300/25 mt-1">${label}</div></div>`}
function arenaOpts(withAll=false){let o=withAll?[{v:'',l:'All Arenas'}]:[];arenasList.forEach(a=>o.push({v:a.id,l:a.name+' — '+(a.city||'')+', '+(a.state||'')}));return o;}

// ════════════════════════════════════════════════
// 1. ARENA PROFILE
// ════════════════════════════════════════════════
async function loadProfile() {
    let stats={arenas:0,events:0,vendors:0,sponsors:0,news:0};
    try{
        const [eR,vR,sR,nR]=await Promise.all([fetch(`/api/events?limit=1`),fetch(`/api/vendors?limit=1`),fetch(`/api/sponsors`),fetch(`/api/news?published=true`)]);
        const [eD,vD,sD,nD]=await Promise.all([eR.json(),vR.json(),sR.json(),nR.json()]);
        stats={arenas:arenasList.length,events:eD.total||0,vendors:vD.total||0,sponsors:(sD.sponsors||[]).length,news:nD.total||0};
    }catch(e){}

    M.innerHTML = card(`
        ${hdr('Platform Overview')}
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 mb-6">
            ${statBox(stats.arenas,'Arenas')}${statBox(stats.events,'Events')}${statBox(stats.vendors,'Vendors')}${statBox(stats.sponsors,'Sponsors')}${statBox(stats.news,'News')}
        </div>
        <h3 class="font-display font-700 text-sm text-cream-300/40 uppercase tracking-wider mb-3">Registered Arenas</h3>
        <div class="space-y-2">
            ${arenasList.length===0?empty('No arenas loaded.'):arenasList.map(a=>`
                <div class="flex items-center justify-between p-3 rounded-lg bg-navy-600/50 border border-gold-400/5 hover:border-gold-400/15 transition-colors">
                    <div class="min-w-0">
                        <span class="font-semibold text-sm text-cream-100 truncate block">${esc(a.name)}</span>
                        <span class="text-xs text-cream-300/30">${esc(a.city||'')}${a.city&&a.state?', ':''}${esc(a.state||'')} · ${cap(a.arena_type||'equine')}</span>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        ${a.is_verified?badge('Verified','bg-sage-500/20 text-sage-400'):''}
                        <a href="../arena.html?id=${a.id}" class="text-gold-400/40 hover:text-gold-400 transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg></a>
                    </div>
                </div>
            `).join('')}
        </div>
    `);
}

// ════════════════════════════════════════════════
// 2. EVENT MANAGER
// ════════════════════════════════════════════════
async function loadEvents() {
    let events=[];
    try{const r=await fetch(`/api/events?limit=200`);const d=await r.json();events=d.events||[];}catch(e){}

    M.innerHTML = card(`
        ${hdr('Events',btn('+ Add Event','showEventForm()'))}
        <div id="eventFormWrap" class="hidden mb-5 p-5 bg-navy-600 rounded-xl border border-gold-400/10">
            <h3 id="evFormTitle" class="font-display font-700 text-sm text-cream-100 mb-4">Add Event</h3>
            <input type="hidden" id="evEditId">
            <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
                ${inp('evTitle','Title *')}
                ${sel('evArena','Arena',arenaOpts(true))}
                ${sel('evType','Event Type',[{v:'',l:'Select'},{v:'rodeo',l:'Rodeo'},{v:'horse show',l:'Horse Show'},{v:'roping',l:'Roping'},{v:'futurity',l:'Futurity'},{v:'clinic',l:'Clinic'},{v:'sale',l:'Sale'},{v:'fair',l:'Fair'},{v:'expo',l:'Expo'}])}
                ${inp('evDiscipline','Discipline','text','','placeholder="e.g. team roping"')}
                ${inp('evStart','Start Date *','date')}
                ${inp('evEnd','End Date','date')}
                ${inp('evPromoter','Promoter')}
                ${inp('evWebsite','Website','url')}
                ${inp('evFee','Entry Fee ($)','number')}
            </div>
            <div class="mt-3">${txta('evDesc','Description','',3)}</div>
            <div class="flex gap-2 mt-4">${btn('Save','saveEvent()')} ${btnO('Cancel','hideEventForm()')}</div>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead><tr class="border-b border-gold-400/10 text-left">
                    <th class="py-2 px-3 text-[10px] font-bold uppercase tracking-wider text-cream-300/25">Event</th>

async function runScraper(dryRun=false){
    const url=document.getElementById('scrapeUrl').value.trim();
    if(!url){alert('Enter a URL.');return;}
    const statusEl=document.getElementById('scrapeStatus');
    const msgEl=document.getElementById('scrapeMsg');
    const resultsEl=document.getElementById('scrapeResults');
    const spinnerEl=document.getElementById('scrapeSpinner');
    statusEl.classList.remove('hidden');
    msgEl.textContent='Fetching and parsing...';
    resultsEl.innerHTML='';
    spinnerEl.classList.remove('hidden');
    // Simulate scraper call (actual would hit a Python worker endpoint)
    setTimeout(()=>{
        spinnerEl.classList.add('hidden');
        msgEl.textContent=dryRun?'Dry run complete':'Scrape complete';
        resultsEl.innerHTML=`<p class="text-xs text-cream-300/30 mt-2">The Python scraper worker (<code class="text-gold-400/50">workers/scraper.py</code>) handles this operation server-side. Connect it via a <code class="text-gold-400/50">/api/scrape</code> endpoint to enable live scraping.</p>`;
    },1500);
}

            <div>
                <h3 class="font-display font-700 text-xs text-cream-300/25 uppercase tracking-wider mb-3">Daily Usage</h3>
                ${(data.daily||[]).length===0?empty('No daily data.'):`<div class="space-y-1.5">${(()=>{const maxT=Math.max(...(data.daily||[]).map(d=>parseInt(d.total_tokens||0)),1);return(data.daily||[]).map(d=>{const pct=parseInt(d.total_tokens||0)/maxT*100;return`<div class="flex items-center gap-3"><span class="w-16 text-[11px] font-semibold text-cream-300/25 flex-shrink-0">${new Date(d.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span><div class="flex-1 h-5 bg-navy-500 rounded-full overflow-hidden"><div class="h-full bg-gold-400/30 rounded-full transition-all" style="width:${pct}%"></div></div><span class="w-16 text-[11px] text-cream-300/20 text-right flex-shrink-0">${parseInt(d.total_tokens||0).toLocaleString()}</span></div>`;}).join('');})()}</div>`}
            </div>
        </div>
    `);
}
async function reloadAnalytics(d){try{const r=await fetch(`/api/llm-usage?days=${d}`);const data=await r.json();const s=data.summary||{};/* Re-render with new period — just reload */loadAnalytics();}catch(e){}}
</script>
