<script>
var API = '';
var period = 30;
var COLORS = {
    gold:'#C8993C', navy:'#0B1D3A', rust:'#9B4D2B', sage:'#5A7247',
    slate:'#3C5A8A', cream:'#E8DFD0', sand:'#FAF6EF',
    chart: ['#C8993C','#5A7247','#9B4D2B','#3C5A8A','#B5882F','#6D8A56','#7F3E22','#8B6E4E','#4A5E3B','#C5CEE0']
};

function toggleDrawer(){document.getElementById('drawer').classList.toggle('open');document.getElementById('drawerBg').classList.toggle('hidden');}

function setPeriod(d){
    period=d;
    document.querySelectorAll('#periodBtns button').forEach(function(b){
        var active=parseInt(b.dataset.d)===d;
        b.className='px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-colors '+(active?'bg-gold-400/15 text-gold-400':'text-cream-300/20 hover:text-cream-300/40');
    });
    loadAll();
}

// ═══════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════

async function loadAll(){
    var [events,vendors,llm]=await Promise.all([loadEvents(),loadVendors(),loadLLM()]);
    renderTopStats(events,vendors,llm);
    renderEventChart(events);
    renderVendorChart(vendors);
    renderCalendarChart(events);
    renderLLMChart(llm);
    renderLLMDetails(llm);
}

async function loadEvents(){
    try{var r=await fetch(API+'/api/events?limit=500&approved=true');var d=await r.json();return d.events||[];}catch(e){return[];}
}
async function loadVendors(){
    try{var r=await fetch(API+'/api/vendors?limit=500');var d=await r.json();return d.vendors||[];}catch(e){return[];}
}
async function loadLLM(){
    try{var r=await fetch(API+'/api/llm-usage?days='+period);return await r.json();}catch(e){return{summary:{},by_operation:[],daily:[],by_arena:[]};}
}

// ═══════════════════════════════════════════════
// TOP STATS
// ═══════════════════════════════════════════════

function renderTopStats(events,vendors,llm){
    var s=llm.summary||{};
    var upcoming=events.filter(function(e){return e.start_date&&e.start_date.split('T')[0]>=new Date().toISOString().split('T')[0]}).length;
    document.getElementById('topStats').innerHTML=
        statBox(events.length,'Events')+statBox(vendors.length,'Vendors')+
        statBox(upcoming,'Upcoming')+statBox('$'+(parseFloat(s.total_cost||0)).toFixed(2),'LLM Cost');
}

function statBox(val,label){
    return '<div class="bg-navy-500 rounded-xl border border-gold-400/10 p-4 text-center fade-in">'+
        '<div class="font-display font-800 text-xl sm:text-2xl text-gold-400 leading-none">'+val+'</div>'+
        '<div class="text-[10px] font-semibold uppercase tracking-wider text-cream-300/25 mt-1">'+label+'</div></div>';
}

// ═══════════════════════════════════════════════
// CHART ENGINE — Pure Canvas
// ═══════════════════════════════════════════════

function getCtx(id){
    var c=document.getElementById(id);
    var dpr=window.devicePixelRatio||1;
    var rect=c.getBoundingClientRect();
    c.width=rect.width*dpr;
    c.height=(parseInt(c.getAttribute('height'))||200)*dpr;
    c.style.height=(parseInt(c.getAttribute('height'))||200)+'px';
    var ctx=c.getContext('2d');
    ctx.scale(dpr,dpr);
    return {ctx:ctx,w:rect.width,h:parseInt(c.getAttribute('height'))||200};
}

// ── Bar Chart ──
function drawBars(id,labels,values,colors,opts){
    opts=opts||{};
    var g=getCtx(id),ctx=g.ctx,w=g.w,h=g.h;
    var pad={t:10,r:10,b:30,l:45};
    var cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
    var max=Math.max.apply(null,values)||1;
    var barW=Math.min(40,cw/values.length*0.6);
    var gap=(cw-barW*values.length)/(values.length+1);

    // Y axis lines
    ctx.strokeStyle='rgba(200,153,60,0.08)';ctx.lineWidth=1;
    for(var i=0;i<=4;i++){
        var y=pad.t+ch-(ch/4*i);
        ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();
        ctx.fillStyle='rgba(200,153,60,0.2)';ctx.font='600 9px "DM Sans"';ctx.textAlign='right';
        ctx.fillText(fmt(max/4*i),pad.l-6,y+3);
    }

    // Bars
    values.forEach(function(v,i){
        var bh=v/max*ch;
        var x=pad.l+gap+(barW+gap)*i;
        var y=pad.t+ch-bh;
        ctx.fillStyle=colors[i%colors.length];
        roundRect(ctx,x,y,barW,bh,3);
        // Label
        ctx.fillStyle='rgba(200,153,60,0.3)';ctx.font='600 9px "DM Sans"';ctx.textAlign='center';
        ctx.fillText(labels[i],x+barW/2,h-pad.b+14);
        // Value on top
        if(v>0){ctx.fillStyle='rgba(250,246,239,0.5)';ctx.fillText(fmt(v),x+barW/2,y-4);}
    });
}

// ── Line Chart ──
function drawLine(id,labels,values,color,opts){
    opts=opts||{};
    var g=getCtx(id),ctx=g.ctx,w=g.w,h=g.h;
    var pad={t:10,r:10,b:30,l:40};
    var cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
    var max=Math.max.apply(null,values)||1;
    var step=cw/(values.length-1||1);

    // Grid
    ctx.strokeStyle='rgba(200,153,60,0.06)';ctx.lineWidth=1;
    for(var i=0;i<=4;i++){
        var y=pad.t+ch-(ch/4*i);
        ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();
        ctx.fillStyle='rgba(200,153,60,0.15)';ctx.font='600 9px "DM Sans"';ctx.textAlign='right';
        ctx.fillText(fmt(max/4*i),pad.l-6,y+3);
    }

    // Fill area
    ctx.beginPath();
    ctx.moveTo(pad.l,pad.t+ch);
    values.forEach(function(v,i){ctx.lineTo(pad.l+step*i,pad.t+ch-v/max*ch);});
    ctx.lineTo(pad.l+step*(values.length-1),pad.t+ch);
    ctx.closePath();
    ctx.fillStyle=color+'18';ctx.fill();

    // Line
    ctx.beginPath();
    values.forEach(function(v,i){
        var x=pad.l+step*i,y=pad.t+ch-v/max*ch;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();

    // Dots
    values.forEach(function(v,i){
        var x=pad.l+step*i,y=pad.t+ch-v/max*ch;
        ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
        ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fillStyle='#091730';ctx.fill();
    });

    // X labels (show subset)
    ctx.fillStyle='rgba(200,153,60,0.2)';ctx.font='600 8px "DM Sans"';ctx.textAlign='center';
    var skipX=Math.max(1,Math.floor(labels.length/8));
    labels.forEach(function(l,i){if(i%skipX===0)ctx.fillText(l,pad.l+step*i,h-pad.b+14);});
}

// ── Donut Chart ──
function drawDonut(id,labels,values,colors){
    var c=document.getElementById(id);
    var dpr=window.devicePixelRatio||1;
    var size=180;
    c.width=size*dpr;c.height=size*dpr;
    c.style.width=size+'px';c.style.height=size+'px';
    var ctx=c.getContext('2d');ctx.scale(dpr,dpr);
    var cx=size/2,cy=size/2,r=size/2-10,inner=r*0.55;
    var total=values.reduce(function(s,v){return s+v},0)||1;
    var angle=-Math.PI/2;

    values.forEach(function(v,i){
        var slice=v/total*Math.PI*2;
        ctx.beginPath();ctx.moveTo(cx+Math.cos(angle)*inner,cy+Math.sin(angle)*inner);
        ctx.arc(cx,cy,r,angle,angle+slice);
        ctx.arc(cx,cy,inner,angle+slice,angle,true);
        ctx.closePath();ctx.fillStyle=colors[i%colors.length];ctx.fill();
        angle+=slice;
    });

    // Center text
    ctx.fillStyle='rgba(250,246,239,0.6)';ctx.font='700 22px Bitter';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(total.toString(),cx,cy-4);
    ctx.fillStyle='rgba(200,153,60,0.3)';ctx.font='600 9px "DM Sans"';
    ctx.fillText('TOTAL',cx,cy+12);
}

// ── Horizontal Bars (for LLM ops) ──
function hBar(label,value,max,color){
    var pct=max>0?(value/max*100):0;
    return '<div class="flex items-center gap-3">'+
        '<span class="w-24 sm:w-32 text-[11px] font-semibold text-cream-300/30 truncate flex-shrink-0">'+esc(label)+'</span>'+
        '<div class="flex-1 h-5 bg-navy-600 rounded-full overflow-hidden">'+
        '<div class="h-full rounded-full transition-all" style="width:'+pct+'%;background:'+color+'"></div></div>'+
        '<span class="w-16 text-[11px] text-cream-300/20 text-right flex-shrink-0">'+fmt(value)+'</span></div>';
}

// ── Helpers ──
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.fill();}
function fmt(n){n=Math.round(n);if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(n>=10000?0:1)+'K';return n.toString();}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
function cap(s){return s?s.split(/[\s-]+/).map(function(w){return w.charAt(0).toUpperCase()+w.slice(1)}).join(' '):''}

// ═══════════════════════════════════════════════
// CHART RENDERERS
// ═══════════════════════════════════════════════

function renderEventChart(events){
    var types={};
    events.forEach(function(e){var t=e.event_type||'other';types[t]=(types[t]||0)+1;});
    var labels=Object.keys(types).map(cap);
    var values=Object.values(types);
    drawBars('chartEvents',labels,values,COLORS.chart);
    // Legend
    document.getElementById('legendEvents').innerHTML=Object.keys(types).map(function(t,i){
        return '<span class="flex items-center gap-1.5 text-[10px] text-cream-300/30"><span class="w-2.5 h-2.5 rounded-sm flex-shrink-0" style="background:'+COLORS.chart[i%COLORS.chart.length]+'"></span>'+cap(t)+' ('+types[t]+')</span>';
    }).join('');
}

function renderVendorChart(vendors){
    var cats={};
    vendors.forEach(function(v){var c=v.category||'other';cats[c]=(cats[c]||0)+1;});
    var labels=Object.keys(cats);
    var values=Object.values(cats);
    drawDonut('chartVendors',labels,values,COLORS.chart);
    // Legend
    document.getElementById('legendVendors').innerHTML=labels.map(function(l,i){
        return '<div class="flex items-center justify-between gap-2">'+
            '<span class="flex items-center gap-1.5 text-[11px] text-cream-300/40 truncate"><span class="w-2.5 h-2.5 rounded-sm flex-shrink-0" style="background:'+COLORS.chart[i%COLORS.chart.length]+'"></span>'+cap(l)+'</span>'+
            '<span class="text-[11px] font-semibold text-cream-300/20">'+values[i]+'</span></div>';
    }).join('');
}

function renderCalendarChart(events){
    // Build daily event count for the period
    var daily={};
    var now=new Date();
    for(var i=period-1;i>=0;i--){
        var d=new Date(now);d.setDate(d.getDate()-i);
        daily[d.toISOString().split('T')[0]]=0;
    }
    events.forEach(function(e){
        if(!e.start_date)return;
        var sd=e.start_date.split('T')[0];
        var ed=(e.end_date||e.start_date).split('T')[0];
        // Count each day the event spans
        var cur=new Date(sd);
        var end=new Date(ed);
        while(cur<=end){
            var key=cur.toISOString().split('T')[0];
            if(daily.hasOwnProperty(key))daily[key]++;
            cur.setDate(cur.getDate()+1);
        }
    });

    var dates=Object.keys(daily).sort();
    var labels=dates.map(function(d){var p=d.split('-');return parseInt(p[1])+'/'+parseInt(p[2]);});
    var values=dates.map(function(d){return daily[d];});
    drawLine('chartCalendar',labels,values,COLORS.gold);
}

function renderLLMChart(llm){
    var dailyData=(llm.daily||[]).slice().reverse();
    if(dailyData.length===0){
        var g=getCtx('chartLLM');
        g.ctx.fillStyle='rgba(200,153,60,0.1)';g.ctx.font='600 12px "DM Sans"';g.ctx.textAlign='center';
        g.ctx.fillText('No LLM usage data',g.w/2,g.h/2);
        return;
    }
    var labels=dailyData.map(function(d){var p=(d.date||'').split('-');return parseInt(p[1])+'/'+parseInt(p[2]);});
    var values=dailyData.map(function(d){return parseInt(d.total_tokens||0);});
    drawBars('chartLLM',labels,values,[COLORS.gold]);
}

function renderLLMDetails(llm){
    var s=llm.summary||{};
    document.getElementById('llmStats').innerHTML=
        '<div class="bg-navy-600 rounded-lg p-3 text-center"><div class="font-display font-700 text-lg text-gold-400 leading-none">'+fmt(parseInt(s.total_calls||0))+'</div><div class="text-[9px] font-semibold uppercase tracking-wider text-cream-300/20 mt-1">API Calls</div></div>'+
        '<div class="bg-navy-600 rounded-lg p-3 text-center"><div class="font-display font-700 text-lg text-gold-400 leading-none">'+fmt(parseInt(s.total_tokens||0))+'</div><div class="text-[9px] font-semibold uppercase tracking-wider text-cream-300/20 mt-1">Tokens</div></div>'+
        '<div class="bg-navy-600 rounded-lg p-3 text-center"><div class="font-display font-700 text-lg text-gold-400 leading-none">$'+(parseFloat(s.total_cost||0)).toFixed(4)+'</div><div class="text-[9px] font-semibold uppercase tracking-wider text-cream-300/20 mt-1">Cost</div></div>'+
        '<div class="bg-navy-600 rounded-lg p-3 text-center"><div class="font-display font-700 text-lg text-gold-400 leading-none">'+fmt(parseInt(s.avg_tokens_per_call||0))+'</div><div class="text-[9px] font-semibold uppercase tracking-wider text-cream-300/20 mt-1">Avg/Call</div></div>';

    // Operation breakdown
    var ops=llm.by_operation||[];
    var maxT=ops.length>0?Math.max.apply(null,ops.map(function(o){return parseInt(o.total_tokens||0)})):1;
    document.getElementById('llmOps').innerHTML=ops.length===0
        ?'<div class="text-center py-6 text-cream-300/10 text-xs">No operations recorded</div>'
        :ops.map(function(o,i){return hBar(cap(o.operation)+(o.model?' · '+o.model:''),parseInt(o.total_tokens||0),maxT,COLORS.chart[i%COLORS.chart.length]);}).join('');
}

window.addEventListener('resize',function(){clearTimeout(resizeTimer);resizeTimer=setTimeout(loadAll,300);});
