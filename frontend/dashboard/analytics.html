<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — Arena Network</title>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0B1D3A;--navy2:#091730;--navy3:#071225;--gold:#C8993C;--cream:#FAF6EF;--rust:#9B4D2B;--sage:#5A7247;--slate:#3C5A8A;--r:10px}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--navy2);color:var(--cream);-webkit-text-size-adjust:100%}
h1,h2,h3{font-family:'Bitter',Georgia,serif}
a{text-decoration:none;color:inherit}
canvas{display:block;width:100%!important}
.side{display:none}.drawer-bg{display:none;position:fixed;inset:0;background:rgba(7,18,37,.6);z-index:40}.drawer-bg.on{display:block}
.drawer{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--navy3);z-index:50;transform:translateX(-100%);transition:transform .3s}.drawer.on{transform:translateX(0)}
.drawer-hdr{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid rgba(200,153,60,.08)}
.drawer-hdr span{font-family:'Bitter',serif;font-weight:700;color:var(--gold);font-size:14px}
.drawer-x{width:36px;height:36px;border-radius:8px;background:var(--navy);display:flex;align-items:center;justify-content:center;border:0;cursor:pointer;color:rgba(250,246,239,.3)}
.drawer-x svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.drawer nav{padding:12px}.drawer nav a{display:block;padding:12px;border-radius:8px;font-size:13px;font-weight:600;color:rgba(250,246,239,.35);margin-bottom:2px}.drawer nav a.on{color:var(--gold);background:rgba(200,153,60,.08)}
.topbar{height:56px;background:var(--navy);border-bottom:1px solid rgba(200,153,60,.08);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.topbar h1{font-size:16px;font-weight:700}
.hbtn{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--navy2);border-radius:8px;border:0;cursor:pointer}
.hbtn svg{width:20px;height:20px;stroke:var(--gold);fill:none;stroke-width:2}
.pbtn{display:flex;gap:4px}
.pbtn button{padding:10px 14px;border-radius:8px;font-size:12px;font-weight:700;border:0;cursor:pointer;font-family:inherit;min-height:44px;background:0;color:rgba(250,246,239,.2)}
.pbtn button.on{background:rgba(200,153,60,.12);color:var(--gold)}
.wrap{padding:16px}
.srow{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.sbox{background:var(--navy);border:1px solid rgba(200,153,60,.08);border-radius:var(--r);padding:12px;text-align:center}
.sbox b{display:block;font-family:'Bitter',serif;font-weight:800;font-size:18px;color:var(--gold);line-height:1}
.sbox small{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(250,246,239,.2);margin-top:2px;display:block}
.chart-card{background:var(--navy);border:1px solid rgba(200,153,60,.08);border-radius:var(--r);padding:14px;margin-bottom:12px}
.chart-card h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(250,246,239,.2);margin-bottom:12px}
.opbar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.opbar .lbl{width:100px;font-size:11px;font-weight:600;color:rgba(250,246,239,.25);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.opbar .bar{flex:1;height:16px;background:var(--navy2);border-radius:8px;overflow:hidden}
.opbar .bar div{height:100%;border-radius:8px}
.opbar .val{width:50px;font-size:11px;color:rgba(250,246,239,.2);text-align:right;flex-shrink:0}

@media(min-width:640px){.srow{grid-template-columns:repeat(4,1fr)}.wrap{padding:20px}}
@media(min-width:1024px){
  .hbtn{display:none}
  .side{display:flex;flex-direction:column;width:220px;flex-shrink:0;background:var(--navy3);border-right:1px solid rgba(200,153,60,.08);position:fixed;top:0;bottom:0;left:0;z-index:30}
  .side-hdr{height:56px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid rgba(200,153,60,.08)}
  .side-hdr a{display:flex;align-items:center;gap:8px}.side-hdr .si{width:28px;height:28px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center}
  .side-hdr .si svg{width:14px;height:14px;stroke:var(--navy);fill:none;stroke-width:2.2}.side-hdr span{font-family:'Bitter',serif;font-weight:700;color:var(--gold);font-size:13px}
  .side nav{padding:12px;flex:1}.side nav a{display:block;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:600;color:rgba(250,246,239,.3);margin-bottom:2px}
  .side nav a:hover{color:var(--gold);background:rgba(200,153,60,.05)}.side nav a.on{color:var(--gold);background:rgba(200,153,60,.08)}
  .side-ft{padding:12px;border-top:1px solid rgba(200,153,60,.08)}.side-ft a{font-size:11px;color:rgba(250,246,239,.2);padding:8px}
  .page{margin-left:220px}
  .cg2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
}
</style>
</head>
<body>
<aside class="side"><div class="side-hdr"><a href="../index.html"><div class="si"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18"/></svg></div><span>ARENA NET</span></a></div><nav><a href="dashboard.html">Overview</a><a href="events.html">Events</a><a href="news.html">News</a><a href="analytics.html" class="on">Analytics</a></nav><div class="side-ft"><a href="../index.html">← Back to Site</a></div></aside>
<div class="drawer-bg" id="dbg" onclick="tog()"></div>
<div class="drawer" id="dw"><div class="drawer-hdr"><span>ANALYTICS</span><button class="drawer-x" onclick="tog()"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18 18 6M6 6l12 12"/></svg></button></div><nav><a href="dashboard.html">Overview</a><a href="events.html">Events</a><a href="news.html">News</a><a href="analytics.html" class="on">Analytics</a></nav></div>

<div class="page">
<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px"><button class="hbtn" onclick="tog()"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg></button><h1>Analytics</h1></div>
  <div class="pbtn" id="pb"></div>
</div>
<div class="wrap">
  <div class="srow" id="ts"></div>
  <div class="cg2">
    <div class="chart-card"><h3>Events by Type</h3><canvas id="c1" height="180"></canvas></div>
    <div class="chart-card"><h3>Calendar Density</h3><canvas id="c2" height="180"></canvas></div>
  </div>
  <div class="cg2" style="margin-top:12px">
    <div class="chart-card"><h3>LLM Token Usage</h3><canvas id="c3" height="180"></canvas></div>
    <div class="chart-card"><h3>LLM Operations</h3><div id="ops"></div></div>
  </div>
</div>
</div>

<script>
function tog(){document.getElementById('dw').classList.toggle('on');document.getElementById('dbg').classList.toggle('on')}
var P=30,CL=['#C8993C','#5A7247','#9B4D2B','#3C5A8A','#B5882F','#6D8A56'];

function setP(d){P=d;document.querySelectorAll('#pb button').forEach(function(b){b.className=parseInt(b.dataset.d)===d?'on':''});go()}
document.getElementById('pb').innerHTML=[7,30,90].map(function(d){return '<button data-d="'+d+'" class="'+(d===30?'on':'')+'" onclick="setP('+d+')">'+d+'d</button>'}).join('');

go();
async function go(){
  var[ev,vn,llm]=await Promise.all([
    fetch('/api/events?limit=500&approved=true').then(function(r){return r.json()}).catch(function(){return{events:[]}}),
    fetch('/api/vendors?limit=500').then(function(r){return r.json()}).catch(function(){return{vendors:[]}}),
    fetch('/api/llm-usage?days='+P).then(function(r){return r.json()}).catch(function(){return{summary:{},by_operation:[],daily:[]}})
  ]);
  var evts=ev.events||[],vnds=vn.vendors||[],s=llm.summary||{};
  var up=evts.filter(function(e){return e.start_date>=new Date().toISOString().split('T')[0]}).length;
  document.getElementById('ts').innerHTML=sb(evts.length,'Events')+sb(vnds.length,'Vendors')+sb(up,'Upcoming')+sb('$'+(parseFloat(s.total_cost||0)).toFixed(2),'LLM Cost');

  // Events by type
  var types={};evts.forEach(function(e){var t=e.event_type||'other';types[t]=(types[t]||0)+1});
  bars('c1',Object.keys(types).map(cap),Object.values(types),CL);

  // Calendar density
  var daily={};var now=new Date();
  for(var i=P-1;i>=0;i--){var d=new Date(now);d.setDate(d.getDate()-i);daily[ds(d)]=0}
  evts.forEach(function(e){if(!e.start_date)return;var sd=e.start_date.split('T')[0],ed=(e.end_date||e.start_date).split('T')[0];
    var c=new Date(sd);while(ds(c)<=ed){var k=ds(c);if(daily.hasOwnProperty(k))daily[k]++;c.setDate(c.getDate()+1)}});
  var dates=Object.keys(daily).sort();
  line('c2',dates.map(function(d){var p=d.split('-');return parseInt(p[1])+'/'+parseInt(p[2])}),dates.map(function(d){return daily[d]}),'#C8993C');

  // LLM daily
  var ld=(llm.daily||[]).slice().reverse();
  if(ld.length)bars('c3',ld.map(function(d){var p=(d.date||'').split('-');return parseInt(p[1])+'/'+parseInt(p[2])}),ld.map(function(d){return parseInt(d.total_tokens||0)}),['#C8993C']);
  else{var ctx=document.getElementById('c3').getContext('2d');ctx.fillStyle='rgba(200,153,60,.15)';ctx.font='600 12px DM Sans';ctx.textAlign='center';ctx.fillText('No LLM data',ctx.canvas.clientWidth/2,90)}

  // LLM ops
  var ops=llm.by_operation||[];
  var maxT=ops.length?Math.max.apply(null,ops.map(function(o){return parseInt(o.total_tokens||0)})):1;
  document.getElementById('ops').innerHTML=ops.length?ops.map(function(o,i){
    var pct=maxT>0?(parseInt(o.total_tokens||0)/maxT*100):0;
    return '<div class="opbar"><span class="lbl">'+cap(o.operation)+'</span><div class="bar"><div style="width:'+pct+'%;background:'+CL[i%CL.length]+'"></div></div><span class="val">'+fmt(parseInt(o.total_tokens||0))+'</span></div>';
  }).join(''):'<div style="text-align:center;padding:24px;color:rgba(250,246,239,.1);font-size:12px">No operations</div>';
}

function sb(v,l){return '<div class="sbox"><b>'+v+'</b><small>'+l+'</small></div>'}

function bars(id,labels,values,colors){
  var c=document.getElementById(id);var dpr=window.devicePixelRatio||1;
  var w=c.clientWidth,h=parseInt(c.getAttribute('height'))||180;
  c.width=w*dpr;c.height=h*dpr;c.style.height=h+'px';
  var ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  var pad={t:8,r:8,b:28,l:36},cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  var max=Math.max.apply(null,values)||1;
  var bw=Math.min(32,cw/values.length*.6),gap=(cw-bw*values.length)/(values.length+1);
  for(var i=0;i<=3;i++){var y=pad.t+ch-(ch/3*i);ctx.strokeStyle='rgba(200,153,60,.06)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();
    ctx.fillStyle='rgba(200,153,60,.15)';ctx.font='600 9px DM Sans';ctx.textAlign='right';ctx.fillText(fmt(max/3*i),pad.l-4,y+3)}
  values.forEach(function(v,i){var bh=v/max*ch;var x=pad.l+gap+(bw+gap)*i;var y=pad.t+ch-bh;
    ctx.fillStyle=colors[i%colors.length];ctx.beginPath();ctx.moveTo(x+3,y);ctx.lineTo(x+bw-3,y);ctx.quadraticCurveTo(x+bw,y,x+bw,y+3);ctx.lineTo(x+bw,pad.t+ch);ctx.lineTo(x,pad.t+ch);ctx.lineTo(x,y+3);ctx.quadraticCurveTo(x,y,x+3,y);ctx.fill();
    ctx.fillStyle='rgba(200,153,60,.2)';ctx.font='600 8px DM Sans';ctx.textAlign='center';ctx.fillText(labels[i],x+bw/2,h-pad.b+14)});
}

function line(id,labels,values,color){
  var c=document.getElementById(id);var dpr=window.devicePixelRatio||1;
  var w=c.clientWidth,h=parseInt(c.getAttribute('height'))||180;
  c.width=w*dpr;c.height=h*dpr;c.style.height=h+'px';
  var ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  var pad={t:8,r:8,b:28,l:32},cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  var max=Math.max.apply(null,values)||1;var step=cw/((values.length-1)||1);
  ctx.beginPath();ctx.moveTo(pad.l,pad.t+ch);
  values.forEach(function(v,i){ctx.lineTo(pad.l+step*i,pad.t+ch-v/max*ch)});
  ctx.lineTo(pad.l+step*(values.length-1),pad.t+ch);ctx.closePath();ctx.fillStyle=color+'18';ctx.fill();
  ctx.beginPath();values.forEach(function(v,i){var x=pad.l+step*i,y=pad.t+ch-v/max*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();
  values.forEach(function(v,i){var x=pad.l+step*i,y=pad.t+ch-v/max*ch;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fillStyle=getComputedStyle(document.body).backgroundColor;ctx.fill()});
  var skip=Math.max(1,Math.floor(labels.length/6));
  ctx.fillStyle='rgba(200,153,60,.15)';ctx.font='600 8px DM Sans';ctx.textAlign='center';
  labels.forEach(function(l,i){if(i%skip===0)ctx.fillText(l,pad.l+step*i,h-pad.b+14)});
}

function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmt(n){n=Math.round(n);return n>=1000?(n/1000).toFixed(n>=10000?0:1)+'K':n.toString()}
function cap(s){return s?s.split(/[\s-]+/).map(function(w){return w.charAt(0).toUpperCase()+w.slice(1)}).join(' '):''}

var RT;window.addEventListener('resize',function(){clearTimeout(RT);RT=setTimeout(go,300)});
</script>
</body>
</html>
