<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="News Publisher — Arena Network">
<meta property="og:description" content="Publish and manage news articles for Arena Network facilities.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://arena-network.pages.dev/">
<meta name="twitter:card" content="summary">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>News Publisher — Arena Network</title>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0B1D3A;--navy2:#091730;--navy3:#071225;--gold:#C8993C;--cream:#FAF6EF;--rust:#9B4D2B;--sage:#5A7247;--r:10px}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--navy2);color:var(--cream);-webkit-text-size-adjust:100%}
h1,h2,h3{font-family:'Bitter',Georgia,serif}
a{text-decoration:none;color:inherit}
.side{display:none}.drawer-bg{display:none;position:fixed;inset:0;background:rgba(7,18,37,.6);z-index:40}.drawer-bg.on{display:block}
.drawer{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--navy3);z-index:50;transform:translateX(-100%);transition:transform .3s}.drawer.on{transform:translateX(0)}
.drawer-hdr{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid rgba(200,153,60,.08)}
.drawer-hdr span{font-family:'Bitter',serif;font-weight:700;color:var(--gold);font-size:14px}
.drawer-x{width:36px;height:36px;border-radius:8px;background:var(--navy);display:flex;align-items:center;justify-content:center;border:0;cursor:pointer;color:rgba(250,246,239,.3)}
.drawer-x svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.drawer nav{padding:12px}.drawer nav a{display:block;padding:12px;border-radius:8px;font-size:13px;font-weight:600;color:rgba(250,246,239,.35);margin-bottom:2px}
.drawer nav a.on{color:var(--gold);background:rgba(200,153,60,.08)}
.topbar{height:56px;background:var(--navy);border-bottom:1px solid rgba(200,153,60,.08);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.topbar h1{font-size:16px;font-weight:700}
.hbtn{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--navy2);border-radius:8px;border:0;cursor:pointer}
.hbtn svg{width:20px;height:20px;stroke:var(--gold);fill:none;stroke-width:2}
.wrap{padding:16px}
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.sbox{background:var(--navy);border:1px solid rgba(200,153,60,.08);border-radius:var(--r);padding:12px;text-align:center}
.sbox b{display:block;font-family:'Bitter',serif;font-weight:800;font-size:18px;color:var(--gold);line-height:1}
.sbox small{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(250,246,239,.2);margin-top:2px;display:block}
.abar{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.ain{width:100%;padding:12px;font-size:14px;background:var(--navy);border:1px solid rgba(200,153,60,.08);border-radius:var(--r);color:var(--cream);font-family:inherit}
.ain:focus{outline:0;border-color:rgba(200,153,60,.25)}.ain::placeholder{color:rgba(250,246,239,.15)}
.abtn{padding:14px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:var(--gold);color:var(--navy);border:0;border-radius:var(--r);cursor:pointer;font-family:inherit;min-height:48px;white-space:nowrap}
.fpanel{display:none;background:var(--navy);border:1px solid rgba(200,153,60,.1);border-radius:var(--r);margin-bottom:16px;overflow:hidden}.fpanel.on{display:block}
.fpanel-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(200,153,60,.08)}
.fpanel-hdr h2{font-size:14px;font-weight:700}
.fpanel-body{padding:16px}
.fgroup{margin-bottom:12px}
.fgroup label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(250,246,239,.25);margin-bottom:4px}
.fgroup input,.fgroup select,.fgroup textarea{width:100%;padding:12px;background:var(--navy2);border:1px solid rgba(200,153,60,.08);border-radius:8px;color:var(--cream);font-size:14px;font-family:inherit;-webkit-appearance:none}
.fgroup input:focus,.fgroup select:focus,.fgroup textarea:focus{outline:0;border-color:rgba(200,153,60,.25)}
.frow2{display:flex;flex-direction:column;gap:12px}
.factions{display:flex;flex-wrap:wrap;gap:8px;padding-top:12px;border-top:1px solid rgba(200,153,60,.08)}
.factions button{padding:12px 20px;border-radius:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border:0;cursor:pointer;font-family:inherit;min-height:48px}
.btn-pub{background:var(--sage);color:#FFF}
.btn-draft{background:0;border:1px solid rgba(200,153,60,.15);color:rgba(200,153,60,.4)}
.btn-cancel{background:0;border:1px solid rgba(200,153,60,.08);color:rgba(250,246,239,.2)}

.nlist{display:flex;flex-direction:column;gap:8px}
.nc{background:var(--navy);border:1px solid rgba(200,153,60,.08);border-radius:var(--r);padding:14px}
.nc h3{font-size:14px;font-weight:700;margin-bottom:4px}
.nc .meta{font-size:11px;color:rgba(250,246,239,.25);margin-bottom:2px}
.nc .preview{font-size:12px;color:rgba(250,246,239,.2);line-height:1.5;margin-bottom:8px}
.nc .acts{display:flex;flex-wrap:wrap;gap:4px;padding-top:8px;border-top:1px solid rgba(200,153,60,.05)}
.nc .acts button{padding:8px 14px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;border:0;cursor:pointer;font-family:inherit;min-height:40px;background:rgba(200,153,60,.05);color:rgba(200,153,60,.4)}
.nc .acts .del{color:rgba(155,77,43,.5);margin-left:auto}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.badge-pub{background:rgba(90,114,71,.12);color:var(--sage)}.badge-draft{background:rgba(250,246,239,.04);color:rgba(250,246,239,.2)}
.toast-wrap{position:fixed;top:64px;right:16px;z-index:60}
.toast{padding:10px 16px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:6px;animation:tin .2s ease-out}
.toast-ok{background:var(--sage);color:#FFF}.toast-err{background:var(--rust);color:#FFF}
@keyframes tin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.loading{text-align:center;padding:40px 16px;color:rgba(200,153,60,.3);font-size:13px;font-weight:600}
.empty{text-align:center;padding:40px 16px;color:rgba(250,246,239,.15);font-size:13px;display:none}

@media(min-width:640px){.abar{flex-direction:row;align-items:flex-end}.abar>*:first-child{flex:1}.abtn{width:auto;padding:12px 24px}.frow2{flex-direction:row}.frow2>*{flex:1}}
@media(min-width:1024px){
  .hbtn{display:none}
  .side{display:flex;flex-direction:column;width:220px;flex-shrink:0;background:var(--navy3);border-right:1px solid rgba(200,153,60,.08);position:fixed;top:0;bottom:0;left:0;z-index:30}
  .side-hdr{height:56px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid rgba(200,153,60,.08)}
  .side-hdr a{display:flex;align-items:center;gap:8px}.side-hdr .si{width:28px;height:28px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center}
  .side-hdr .si svg{width:14px;height:14px;stroke:var(--navy);fill:none;stroke-width:2.2}
  .side-hdr span{font-family:'Bitter',serif;font-weight:700;color:var(--gold);font-size:13px}
  .side nav{padding:12px;flex:1}.side nav a{display:block;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:600;color:rgba(250,246,239,.3);margin-bottom:2px}
  .side nav a:hover{color:var(--gold);background:rgba(200,153,60,.05)}.side nav a.on{color:var(--gold);background:rgba(200,153,60,.08)}
  .side-ft{padding:12px;border-top:1px solid rgba(200,153,60,.08)}.side-ft a{font-size:11px;color:rgba(250,246,239,.2);padding:8px}
  .page{margin-left:220px}
}
</style>
</head>
<body>
<aside class="side"><div class="side-hdr"><a href="../index.html"><div class="si"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18"/></svg></div><span>ARENA NET</span></a></div><nav><a href="dashboard.html">Overview</a><a href="events.html">Events</a><a href="news.html" class="on">News</a><a href="analytics.html">Analytics</a></nav><div class="side-ft"><a href="../index.html">← Back to Site</a></div></aside>
<div class="drawer-bg" id="dbg" onclick="tog()"></div>
<div class="drawer" id="dw"><div class="drawer-hdr"><span>NEWS</span><button class="drawer-x" onclick="tog()"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18 18 6M6 6l12 12"/></svg></button></div><nav><a href="dashboard.html">Overview</a><a href="events.html">Events</a><a href="news.html" class="on">News</a><a href="analytics.html">Analytics</a></nav></div>

<div class="page">
<div class="topbar"><div style="display:flex;align-items:center;gap:10px"><button class="hbtn" onclick="tog()"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg></button><h1>News Publisher</h1></div></div>
<div class="wrap">
  <div class="toast-wrap" id="tw"></div>
  <div class="srow" id="stats"></div>
  <div class="abar">
    <input id="si" type="text" class="ain" placeholder="Search articles...">
    <select id="sf" class="ain" style="width:auto;min-width:120px" onchange="render()">
      <option value="">All Status</option>
      <option value="published">Published</option>
      <option value="draft">Drafts</option>
    </select>
    <button class="abtn" onclick="openF()">+ New Article</button>
  </div>

  <div class="fpanel" id="fp">
    <div class="fpanel-hdr"><h2 id="fh">New Article</h2><button class="drawer-x" onclick="closeF()"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18 18 6M6 6l12 12"/></svg></button></div>
    <div class="fpanel-body">
      <input type="hidden" id="nid">
      <div class="fgroup"><label>Title *</label><input id="nt" type="text" placeholder="Article headline..."></div>
      <div class="frow2">
        <div class="fgroup"><label>Arena</label><select id="nar"></select></div>
        <div class="fgroup"><label>Publish Date</label><input id="ndt" type="date"></div>
      </div>
      <div class="fgroup"><label>Body *</label><textarea id="nb" rows="8" placeholder="Write your article..."></textarea></div>
      <div class="factions">
        <button class="btn-pub" onclick="saveN(true)">Publish</button>
        <button class="btn-draft" onclick="saveN(false)">Save Draft</button>
        <button class="btn-cancel" onclick="closeF()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="nlist" id="nl"><div class="loading">Loading articles...</div></div>
  <div class="empty" id="em">No articles yet</div>
</div>
</div>

<script>
function tog(){document.getElementById('dw').classList.toggle('on');document.getElementById('dbg').classList.toggle('on')}
var NW=[],AR=[],T;
document.getElementById('si').oninput=function(){clearTimeout(T);T=setTimeout(render,300)};

(async function(){
  try{var r=await fetch('/api/arenas?limit=200');var d=await r.json();AR=d.arenas||[]}catch(e){}
  document.getElementById('nar').innerHTML='<option value="">Network-wide</option>'+AR.map(function(a){return '<option value="'+a.id+'">'+E(a.name)+'</option>'}).join('');
  await loadN();
})();

async function loadN(){
  try{var r=await fetch('/api/news?limit=200');var d=await r.json();NW=d.news||[]}catch(e){NW=[]}
  renderStats();render();
}
function renderStats(){
  var pub=NW.filter(function(n){return n.is_published}).length;
  document.getElementById('stats').innerHTML=sb(NW.length,'Total')+sb(pub,'Published')+sb(NW.length-pub,'Drafts');
}
function sb(v,l){return '<div class="sbox"><b>'+v+'</b><small>'+l+'</small></div>'}

function render(){
  var s=document.getElementById('si').value.toLowerCase().trim();
  var st=document.getElementById('sf').value;
  var f=NW.filter(function(n){
    if(s&&(n.title+' '+(n.body||'')+' '+(n.arena_name||'')).toLowerCase().indexOf(s)===-1) return false;
    if(st==='published'&&!n.is_published) return false;
    if(st==='draft'&&n.is_published) return false;
    return true;
  });
  var el=document.getElementById('nl'),em=document.getElementById('em');
  if(!f.length&&!NW.length){el.innerHTML='';em.style.display='block';return}
  em.style.display='none';
  if(!f.length){el.innerHTML='<div class="empty" style="display:block">No matches</div>';return}
  el.innerHTML=f.map(function(n){
    var d=n.publish_date?new Date(n.publish_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
    var prev=(n.body||'').substring(0,100);if((n.body||'').length>100)prev+='...';
    return '<div class="nc"><h3>'+E(n.title)+'</h3>'+
      '<div class="meta"><span class="badge '+(n.is_published?'badge-pub':'badge-draft')+'">'+(n.is_published?'Published':'Draft')+'</span> '+d+(n.arena_name?' · '+E(n.arena_name):'')+'</div>'+
      (prev?'<div class="preview">'+E(prev)+'</div>':'')+
      '<div class="acts">'+
        '<button onclick="editN(\''+n.id+'\')">Edit</button>'+
        '<button onclick="togPub(\''+n.id+'\','+(n.is_published?'false':'true')+')">'+(n.is_published?'Unpublish':'Publish')+'</button>'+
        '<button class="del" onclick="delN(\''+n.id+'\',\''+E(n.title).replace(/'/g,"\\'")+'\')">Delete</button>'+
      '</div></div>';
  }).join('');
}

function openF(){
  document.getElementById('nid').value='';document.getElementById('fh').textContent='New Article';
  ['nt','nb'].forEach(function(x){document.getElementById(x).value=''});
  document.getElementById('nar').value='';
  document.getElementById('ndt').value=new Date().toISOString().split('T')[0];
  document.getElementById('fp').classList.add('on');window.scrollTo({top:0,behavior:'smooth'});
}
function closeF(){document.getElementById('fp').classList.remove('on')}

function editN(id){
  var n=NW.find(function(x){return x.id===id});if(!n)return;
  document.getElementById('nid').value=n.id;document.getElementById('fh').textContent='Edit Article';
  document.getElementById('nt').value=n.title||'';
  document.getElementById('nar').value=n.arena_id||'';
  document.getElementById('ndt').value=n.publish_date?n.publish_date.split('T')[0]:'';
  document.getElementById('nb').value=n.body||'';
  document.getElementById('fp').classList.add('on');window.scrollTo({top:0,behavior:'smooth'});
}

async function saveN(pub){
  var id=document.getElementById('nid').value;
  var title=document.getElementById('nt').value.trim();
  var body=document.getElementById('nb').value.trim();
  if(!title){toast('Title required','err');return}
  if(!body){toast('Body required','err');return}
  var payload={title:title,body:body,arena_id:document.getElementById('nar').value||null,
    publish_date:document.getElementById('ndt').value||new Date().toISOString().split('T')[0],is_published:pub};
  try{
    var url=id?'/api/news?id='+id:'/api/news';
    await fetch(url,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    closeF();toast(id?'Updated':(pub?'Published':'Draft saved'),'ok');await loadN();
  }catch(e){toast('Save failed','err')}
}

async function togPub(id,pub){
  try{await fetch('/api/news?id='+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({is_published:pub==='true'||pub===true})});
    toast(pub?'Published':'Unpublished','ok');await loadN()}catch(e){}
}

async function delN(id,title){
  if(!confirm('Delete "'+title+'"?'))return;
  try{await fetch('/api/news?id='+id,{method:'DELETE'});toast('Deleted','ok');await loadN()}catch(e){toast('Failed','err')}
}

function toast(msg,type){var el=document.createElement('div');el.className='toast toast-'+(type||'ok');el.textContent=msg;document.getElementById('tw').appendChild(el);setTimeout(function(){el.remove()},3000)}
function E(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):''}
</script>
</body>
</html>
