<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Manager — Arena Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0B1D3A;--navy2:#091730;--navy3:#071225;--gold:#C8993C;--cream:#FAF6EF;--cream2:#F2EBE0;--cream3:#E8DFD0;--rust:#9B4D2B;--sage:#5A7247;--white:#FFF;--r:10px}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--navy2);color:var(--cream);-webkit-text-size-adjust:100%}
h1,h2,h3{font-family:'Bitter',Georgia,serif}
a{text-decoration:none;color:inherit}

/* Phone: no sidebar, just top bar + drawer */
.side{display:none}
.drawer-bg{display:none;position:fixed;inset:0;background:rgba(7,18,37,.6);z-index:40}
.drawer-bg.on{display:block}
.drawer{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--navy3);z-index:50;transform:translateX(-100%);transition:transform .3s}
.drawer.on{transform:translateX(0)}
.drawer-hdr{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid rgba(200,153,60,.08)}
.drawer-hdr span{font-family:'Bitter',serif;font-weight:700;color:var(--gold);font-size:14px}
.drawer-x{width:36px;height:36px;border-radius:8px;background:var(--navy);display:flex;align-items:center;justify-content:center;border:0;cursor:pointer;color:rgba(250,246,239,.3)}
.drawer-x svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.drawer nav{padding:12px}
.drawer nav a{display:block;padding:12px;border-radius:8px;font-size:13px;font-weight:600;color:rgba(250,246,239,.35);margin-bottom:2px}
.drawer nav a.on{color:var(--gold);background:rgba(200,153,60,.08)}

.topbar{height:56px;background:var(--navy);border-bottom:1px solid rgba(200,153,60,.08);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.topbar h1{font-size:16px;font-weight:700;color:var(--cream)}
.hbtn{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--navy2);border-radius:8px;border:0;cursor:pointer}
.hbtn svg{width:20px;height:20px;stroke:var(--gold);fill:none;stroke-width:2}

.wrap{padding:16px}

/* Stats */
.srow{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.sbox{background:var(--navy);border:1px solid rgba(200,153,60,.08);border-radius:var(--r);padding:12px;text-align:center}
.sbox b{display:block;font-family:'Bitter',serif;font-weight:800;font-size:20px;color:var(--gold);line-height:1}
.sbox small{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(250,246,239,.2);margin-top:2px;display:block}

/* Actions */
.abar{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.ain{width:100%;padding:12px;font-size:14px;background:var(--navy);border:1px solid rgba(200,153,60,.08);border-radius:var(--r);color:var(--cream);font-family:inherit}
.ain:focus{outline:0;border-color:rgba(200,153,60,.25)}
.ain::placeholder{color:rgba(250,246,239,.15)}
.abtn{padding:14px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:var(--gold);color:var(--navy);border:0;border-radius:var(--r);cursor:pointer;font-family:inherit;min-height:48px;white-space:nowrap}

/* Form */
.fpanel{display:none;background:var(--navy);border:1px solid rgba(200,153,60,.1);border-radius:var(--r);margin-bottom:16px;overflow:hidden}
.fpanel.on{display:block}
.fpanel-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(200,153,60,.08)}
.fpanel-hdr h2{font-size:14px;font-weight:700}
.fpanel-body{padding:16px}
.fgroup{margin-bottom:12px}
.fgroup label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(250,246,239,.25);margin-bottom:4px}
.fgroup input,.fgroup select,.fgroup textarea{width:100%;padding:12px;background:var(--navy2);border:1px solid rgba(200,153,60,.08);border-radius:8px;color:var(--cream);font-size:14px;font-family:inherit;-webkit-appearance:none;appearance:none}
.fgroup input:focus,.fgroup select:focus,.fgroup textarea:focus{outline:0;border-color:rgba(200,153,60,.25)}
.frow2{display:flex;flex-direction:column;gap:12px}
.factions{display:flex;flex-wrap:wrap;gap:8px;padding-top:12px;border-top:1px solid rgba(200,153,60,.08)}
.factions button{padding:12px 20px;border-radius:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border:0;cursor:pointer;font-family:inherit;min-height:48px}
.btn-save{background:var(--gold);color:var(--navy)}
.btn-cancel{background:0;border:1px solid rgba(200,153,60,.15);color:rgba(200,153,60,.4)}

/* Event list */
.elist{display:flex;flex-direction:column;gap:8px}
.ev{background:var(--navy);border:1px solid rgba(200,153,60,.08);border-radius:var(--r);padding:14px}
.ev h3{font-size:14px;font-weight:700;margin-bottom:4px}
.ev .meta{font-size:12px;color:rgba(250,246,239,.3)}
.ev .acts{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;padding-top:8px;border-top:1px solid rgba(200,153,60,.05)}
.ev .acts button{padding:8px 14px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border:0;cursor:pointer;font-family:inherit;min-height:40px;background:rgba(200,153,60,.05);color:rgba(200,153,60,.4)}
.ev .acts button:active{background:rgba(200,153,60,.1)}
.ev .acts .del{color:rgba(155,77,43,.5);margin-left:auto}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.badge-ok{background:rgba(90,114,71,.12);color:var(--sage)}
.badge-pend{background:rgba(155,77,43,.12);color:var(--rust)}

.toast-wrap{position:fixed;top:64px;right:16px;z-index:60}
.toast{padding:10px 16px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:6px;animation:tin .2s ease-out}
.toast-ok{background:var(--sage);color:var(--white)}
.toast-err{background:var(--rust);color:var(--white)}
@keyframes tin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

.empty{text-align:center;padding:40px 16px;color:rgba(250,246,239,.15);font-size:13px}

@media(min-width:640px){
  .abar{flex-direction:row;align-items:flex-end}
  .abar>*:first-child{flex:1}
  .abtn{width:auto;padding:12px 24px}
  .frow2{flex-direction:row}
  .frow2>*{flex:1}
  .srow{grid-template-columns:repeat(4,1fr)}
}
@media(min-width:1024px){
  .hbtn{display:none}
  .side{display:flex;flex-direction:column;width:220px;flex-shrink:0;background:var(--navy3);border-right:1px solid rgba(200,153,60,.08);position:fixed;top:0;bottom:0;left:0;z-index:30}
  .side-hdr{height:56px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid rgba(200,153,60,.08)}
  .side-hdr a{display:flex;align-items:center;gap:8px}
  .side-hdr .si{width:28px;height:28px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center}
  .side-hdr .si svg{width:14px;height:14px;stroke:var(--navy);fill:none;stroke-width:2.2}
  .side-hdr span{font-family:'Bitter',serif;font-weight:700;color:var(--gold);font-size:13px}
  .side nav{padding:12px;flex:1}
  .side nav a{display:block;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:600;color:rgba(250,246,239,.3);margin-bottom:2px}
  .side nav a:hover{color:var(--gold);background:rgba(200,153,60,.05)}
  .side nav a.on{color:var(--gold);background:rgba(200,153,60,.08)}
  .side-ft{padding:12px;border-top:1px solid rgba(200,153,60,.08)}
  .side-ft a{font-size:11px;color:rgba(250,246,239,.2);display:flex;align-items:center;gap:6px;padding:8px}
  .page{margin-left:220px}
}
</style>
</head>
<body>

<!-- Desktop sidebar -->
<aside class="side">
  <div class="side-hdr"><a href="../index.html"><div class="si"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18"/></svg></div><span>ARENA NET</span></a></div>
  <nav>
    <a href="dashboard.html">Overview</a>
    <a href="events.html" class="on">Events</a>
    <a href="news.html">News</a>
    <a href="analytics.html">Analytics</a>
  </nav>
  <div class="side-ft"><a href="../index.html">← Back to Site</a></div>
</aside>

<!-- Mobile drawer -->
<div class="drawer-bg" id="dbg" onclick="tog()"></div>
<div class="drawer" id="dw">
  <div class="drawer-hdr"><span>EVENTS</span><button class="drawer-x" onclick="tog()"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18 18 6M6 6l12 12"/></svg></button></div>
  <nav>
    <a href="dashboard.html">Overview</a>
    <a href="events.html" class="on">Events</a>
    <a href="news.html">News</a>
    <a href="analytics.html">Analytics</a>
  </nav>
</div>

<div class="page">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="hbtn" onclick="tog()"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg></button>
      <h1>Event Manager</h1>
    </div>
  </div>

  <div class="wrap">
    <div class="toast-wrap" id="tw"></div>

    <div class="srow" id="stats"></div>

    <div class="abar">
      <div style="position:relative">
        <input id="si" type="text" class="ain" placeholder="Search events...">
      </div>
      <button class="abtn" onclick="openF()">+ Add Event</button>
    </div>

    <div class="fpanel" id="fp">
      <div class="fpanel-hdr"><h2 id="fh">New Event</h2><button class="drawer-x" onclick="closeF()"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18 18 6M6 6l12 12"/></svg></button></div>
      <div class="fpanel-body">
        <input type="hidden" id="eid">
        <div class="fgroup"><label>Title *</label><input id="ft" type="text" placeholder="Event name..."></div>
        <div class="frow2">
          <div class="fgroup"><label>Arena</label><select id="far"></select></div>
          <div class="fgroup"><label>Start Date *</label><input id="fsd" type="date"></div>
        </div>
        <div class="frow2">
          <div class="fgroup"><label>End Date</label><input id="fed" type="date"></div>
          <div class="fgroup"><label>Type</label><select id="fty"><option value="">Select...</option><option value="rodeo">Rodeo</option><option value="horse show">Horse Show</option><option value="futurity">Futurity</option><option value="roping">Roping</option><option value="expo">Expo</option><option value="fair">Fair</option></select></div>
        </div>
        <div class="frow2">
          <div class="fgroup"><label>Discipline</label><input id="fdi" type="text" placeholder="e.g. reining, cutting..."></div>
          <div class="fgroup"><label>Promoter</label><input id="fpr" type="text" placeholder="Promoter name..."></div>
        </div>
        <div class="fgroup"><label>Website</label><input id="fwb" type="url" placeholder="https://..."></div>
        <div class="fgroup"><label>Description</label><textarea id="fde" rows="3" placeholder="Event details..."></textarea></div>
        <div class="factions">
          <button class="btn-save" onclick="save()">Save Event</button>
          <button class="btn-cancel" onclick="closeF()">Cancel</button>
        </div>
      </div>
    </div>

    <div class="elist" id="el"></div>
    <div class="empty" id="em" style="display:none">No events found</div>
  </div>
</div>

<script>
function tog(){document.getElementById('dw').classList.toggle('on');document.getElementById('dbg').classList.toggle('on')}

var EV=[],AR=[],T;
document.getElementById('si').oninput=function(){clearTimeout(T);T=setTimeout(render,300)};

(async function(){
  try{var r=await fetch('/api/arenas?limit=200');var d=await r.json();AR=d.arenas||[]}catch(e){}
  var sel=document.getElementById('far');
  sel.innerHTML='<option value="">No arena</option>'+AR.map(function(a){return '<option value="'+a.id+'">'+E(a.name)+'</option>'}).join('');
  await loadEv();
})();

async function loadEv(){
  try{var r=await fetch('/api/events?limit=500');var d=await r.json();EV=d.events||[]}catch(e){EV=[]}
  renderStats();render();
}

function renderStats(){
  var ok=EV.filter(function(e){return e.is_approved}).length;
  var pend=EV.length-ok;
  var up=EV.filter(function(e){return e.start_date>=new Date().toISOString().split('T')[0]}).length;
  document.getElementById('stats').innerHTML=
    sb(EV.length,'Total')+sb(ok,'Approved')+sb(pend,'Pending')+sb(up,'Upcoming');
}
function sb(v,l){return '<div class="sbox"><b>'+v+'</b><small>'+l+'</small></div>'}

function render(){
  var s=document.getElementById('si').value.toLowerCase().trim();
  var f=EV.filter(function(e){
    if(!s)return true;
    return(e.title+' '+(e.arena_name||'')+' '+(e.discipline||'')+' '+(e.promoter||'')).toLowerCase().indexOf(s)!==-1;
  });
  var el=document.getElementById('el'),em=document.getElementById('em');
  if(!f.length){el.innerHTML='';em.style.display='block';return}
  em.style.display='none';
  el.innerHTML=f.map(function(e){
    var d=e.start_date?new Date(e.start_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
    var ed=e.end_date?new Date(e.end_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
    return '<div class="ev"><h3>'+E(e.title)+'</h3>'+
      '<div class="meta">'+d+(ed?' — '+ed:'')+(e.arena_name?' · '+E(e.arena_name):'')+'</div>'+
      (e.discipline?'<div class="meta">'+E(e.discipline)+(e.promoter?' · '+E(e.promoter):'')+'</div>':'')+
      '<span class="badge '+(e.is_approved?'badge-ok':'badge-pend')+'">'+(e.is_approved?'Approved':'Pending')+'</span>'+
      '<div class="acts">'+
        '<button onclick="editEv(\''+e.id+'\')">Edit</button>'+
        (!e.is_approved?'<button onclick="approve(\''+e.id+'\')">Approve</button>':'')+
        '<button class="del" onclick="delEv(\''+e.id+'\',\''+E(e.title).replace(/'/g,"\\'")+'\')">Delete</button>'+
      '</div></div>';
  }).join('');
}

function openF(){
  document.getElementById('eid').value='';
  document.getElementById('fh').textContent='New Event';
  ['ft','fsd','fed','fdi','fpr','fwb','fde'].forEach(function(x){document.getElementById(x).value=''});
  document.getElementById('far').value='';
  document.getElementById('fty').value='';
  document.getElementById('fp').classList.add('on');
  document.getElementById('ft').focus();
  window.scrollTo({top:0,behavior:'smooth'});
}
function closeF(){document.getElementById('fp').classList.remove('on')}

function editEv(id){
  var e=EV.find(function(x){return x.id===id});if(!e)return;
  document.getElementById('eid').value=e.id;
  document.getElementById('fh').textContent='Edit Event';
  document.getElementById('ft').value=e.title||'';
  document.getElementById('far').value=e.arena_id||'';
  document.getElementById('fsd').value=e.start_date?e.start_date.split('T')[0]:'';
  document.getElementById('fed').value=e.end_date?e.end_date.split('T')[0]:'';
  document.getElementById('fty').value=e.event_type||'';
  document.getElementById('fdi').value=e.discipline||'';
  document.getElementById('fpr').value=e.promoter||'';
  document.getElementById('fwb').value=e.website||'';
  document.getElementById('fde').value=e.description||'';
  document.getElementById('fp').classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

async function save(){
  var id=document.getElementById('eid').value;
  var title=document.getElementById('ft').value.trim();
  var sd=document.getElementById('fsd').value;
  if(!title){toast('Title required','err');return}
  if(!sd){toast('Start date required','err');return}

  var body={title:title,arena_id:document.getElementById('far').value||null,start_date:sd,
    end_date:document.getElementById('fed').value||null,event_type:document.getElementById('fty').value||null,
    discipline:document.getElementById('fdi').value||null,promoter:document.getElementById('fpr').value||null,
    website:document.getElementById('fwb').value||null,description:document.getElementById('fde').value||null};

  try{
    var url=id?'/api/events?id='+id:'/api/events';
    await fetch(url,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    closeF();toast(id?'Event updated':'Event created','ok');await loadEv();
  }catch(e){toast('Save failed','err')}
}

async function approve(id){
  try{await fetch('/api/events?id='+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({is_approved:true,status:'approved'})});toast('Approved','ok');await loadEv()}catch(e){}
}

async function delEv(id,title){
  if(!confirm('Delete "'+title+'"?'))return;
  try{await fetch('/api/events?id='+id,{method:'DELETE'});toast('Deleted','ok');await loadEv()}catch(e){toast('Delete failed','err')}
}

function toast(msg,type){
  var el=document.createElement('div');
  el.className='toast toast-'+(type||'ok');el.textContent=msg;
  document.getElementById('tw').appendChild(el);
  setTimeout(function(){el.remove()},3000);
}

function E(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):''}
</script>
</body>
</html>
