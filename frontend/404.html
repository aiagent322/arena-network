<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Arena Network</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@700;800&family=DM+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:#0B1D3A;color:#FAF6EF;min-height:100vh;display:flex;flex-direction:column;-webkit-text-size-adjust:100%}
h1,h2{font-family:'Bitter',Georgia,serif}
a{text-decoration:none;color:inherit}
.hdr{height:56px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid rgba(200,153,60,.08)}
.logo{display:flex;align-items:center;gap:8px}
.logo-box{width:32px;height:32px;background:#C8993C;border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-box svg{width:18px;height:18px;stroke:#0B1D3A;fill:none;stroke-width:2.2}
.logo-t{font-family:'Bitter',serif;font-weight:800;font-size:15px;color:#C8993C;letter-spacing:.04em}
.logo-t span{color:#F2EBE0;font-weight:600}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 16px;text-align:center}
.code{font-family:'Bitter',serif;font-weight:800;font-size:72px;color:#C8993C;line-height:1;margin-bottom:8px}
.main h1{font-size:22px;font-weight:700;color:#FAF6EF;margin-bottom:8px}
.main p{font-size:14px;color:rgba(250,246,239,.4);line-height:1.6;max-width:360px;margin-bottom:28px}
.links{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px}
.links a{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:10px;font-size:14px;font-weight:700;min-height:48px}
.links a svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5}
.btn-g{background:#C8993C;color:#0B1D3A}
.btn-o{background:rgba(200,153,60,.1);color:#C8993C}
.ft{padding:20px 16px;text-align:center;border-top:1px solid rgba(200,153,60,.08)}
.ft span{font-size:11px;color:rgba(250,246,239,.12)}
@media(min-width:640px){.code{font-size:96px}.main h1{font-size:26px}.links{flex-direction:row;max-width:400px}}
</style>
</head>
<body>
<header class="hdr">
  <a href="/" class="logo"><div class="logo-box"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg></div><div class="logo-t">ARENA <span>NETWORK</span></div></a>
</header>
<main class="main">
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or may have been moved.</p>
  <div class="links">
    <a href="/" class="btn-g"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18"/></svg>Arena Directory</a>
    <a href="/calendar" class="btn-o"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25"/></svg>Event Calendar</a>
  </div>
</main>
<footer class="ft"><span>&copy; 2026 Arena Network</span></footer>
</body>
</html>
