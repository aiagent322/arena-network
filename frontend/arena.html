<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="Arena — Arena Network">
<meta property="og:description" content="Arena details, upcoming events, vendors, and sponsors on Arena Network.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://arena-network.pages.dev/">
<meta name="twitter:card" content="summary">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title id="pt">Arena — Arena Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0B1D3A;--gold:#C8993C;--cream:#FAF6EF;--cream2:#F2EBE0;--cream3:#E8DFD0;--rust:#9B4D2B;--sage:#5A7247;--slate:#3C5A8A;--white:#FFF;--r:10px}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cream);color:var(--navy);-webkit-text-size-adjust:100%}
h1,h2,h3{font-family:'Bitter',Georgia,serif}
a{text-decoration:none;color:inherit}

/* Header */
.hdr{position:sticky;top:0;z-index:50;background:var(--navy);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px}
.logo-box{width:32px;height:32px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-box svg{width:18px;height:18px;stroke:var(--navy);fill:none;stroke-width:2.2}
.logo-t{font-family:'Bitter',serif;font-weight:800;font-size:15px;color:var(--gold);letter-spacing:.04em}
.logo-t span{color:var(--cream2);font-weight:600}
.mbtn{width:48px;height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:0;border:0;cursor:pointer}
.mbtn i{display:block;width:22px;height:2px;background:var(--gold);border-radius:2px}
.dnav{display:none}
.mnav{max-height:0;overflow:hidden;transition:max-height .3s;background:var(--navy);padding:0 16px}
.mnav.open{max-height:300px}
.mnav a{display:block;padding:14px 12px;color:var(--cream2);font-weight:600;font-size:14px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid rgba(200,153,60,.08)}

/* Hero */
.hero{background:var(--navy);padding:20px 16px 28px}
.back{display:inline-flex;align-items:center;gap:6px;color:rgba(200,153,60,.6);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.hero h1{color:var(--cream);font-size:22px;font-weight:800;line-height:1.25;margin-bottom:6px}
.hero .loc{display:flex;align-items:center;gap:6px;color:rgba(250,246,239,.6);font-size:13px;margin-bottom:8px}
.hero .loc svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:16px;background:rgba(250,246,239,.08);font-size:11px;font-weight:600;color:rgba(250,246,239,.6)}
.pill .dot{width:7px;height:7px;border-radius:50%}
.vbadge{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;background:rgba(90,114,71,.15);color:var(--sage);font-size:10px;font-weight:700;text-transform:uppercase;margin-left:8px}
.vbadge svg{width:12px;height:12px;fill:currentColor}
.contact-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.cbtn{display:inline-flex;align-items:center;gap:6px;padding:12px 16px;border-radius:var(--r);font-size:12px;font-weight:600;min-height:48px}
.cbtn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.cbtn-g{background:rgba(200,153,60,.12);color:var(--gold)}
.cbtn-w{background:rgba(250,246,239,.08);color:rgba(250,246,239,.6)}

/* Facility card */
.fcard{margin:0 16px;margin-top:-16px;position:relative;z-index:10;background:var(--white);border-radius:var(--r);border:1px solid var(--cream3);padding:16px;margin-bottom:16px}
.fcard h2{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(11,29,58,.35);margin-bottom:12px}
.fgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.fbox{text-align:center;padding:10px 4px;background:var(--cream);border-radius:8px}
.fbox .v{font-family:'Bitter',serif;font-weight:700;font-size:18px;color:var(--navy)}
.fbox .l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(11,29,58,.3);margin-top:2px}
.desc{margin-top:14px;padding-top:12px;border-top:1px solid var(--cream2);font-size:13px;line-height:1.65;color:rgba(11,29,58,.5)}

/* Tabs */
.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:2px solid var(--cream3);margin:0 16px;gap:0}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:14px 16px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(11,29,58,.3);white-space:nowrap;border:0;background:0;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;min-height:48px;font-family:inherit}
.tab.on{color:var(--navy);border-color:var(--gold)}
.panel{padding:16px;display:none}
.panel.on{display:block}

/* Event cards */
.ecard{background:var(--white);border-radius:var(--r);border:1px solid rgba(232,223,208,.5);padding:14px;margin-bottom:10px}
.ecard h3{font-size:15px;font-weight:700;margin-bottom:4px}
.ecard .meta{font-size:12px;color:rgba(11,29,58,.4);margin-bottom:2px}
.etag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:6px}
.etag-rodeo{background:rgba(155,77,43,.1);color:var(--rust)}
.etag-show{background:rgba(90,114,71,.1);color:var(--sage)}
.etag-futurity{background:rgba(11,29,58,.06);color:var(--navy)}
.etag-roping{background:rgba(200,153,60,.1);color:var(--gold)}
.etag-expo{background:rgba(60,90,138,.1);color:var(--slate)}
.etag-fair{background:rgba(139,110,78,.1);color:#8B6E4E}

/* Vendor/Sponsor/News cards */
.vcard{background:var(--white);border-radius:var(--r);border:1px solid rgba(232,223,208,.5);padding:14px;margin-bottom:10px}
.vcard h3{font-size:14px;font-weight:700;margin-bottom:4px}
.vcard .sub{font-size:12px;color:rgba(11,29,58,.35)}
.vcard .cat{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;background:var(--cream);color:rgba(11,29,58,.4);margin-top:6px}
.ncard{background:var(--white);border-radius:var(--r);border:1px solid rgba(232,223,208,.5);padding:14px;margin-bottom:10px}
.ncard h3{font-size:15px;font-weight:700;margin-bottom:4px}
.ncard .date{font-size:11px;color:rgba(11,29,58,.3);margin-bottom:6px}
.ncard p{font-size:13px;color:rgba(11,29,58,.45);line-height:1.6}

/* States */
.loading{text-align:center;padding:60px 16px;color:rgba(11,29,58,.2);font-size:14px}
.error{text-align:center;padding:48px 16px}
.error h2{font-size:18px;color:rgba(11,29,58,.4);margin-bottom:8px}
.error p{font-size:13px;color:rgba(11,29,58,.25);margin-bottom:16px}
.error a{display:inline-flex;align-items:center;gap:6px;padding:12px 20px;background:var(--gold);color:var(--navy);font-weight:700;font-size:13px;border-radius:var(--r);min-height:48px}
.empty-tab{text-align:center;padding:32px 16px;color:rgba(11,29,58,.2);font-size:13px}

/* Footer */
.ft{background:var(--navy);padding:28px 16px;text-align:center;margin-top:20px}
.ft .br{font-family:'Bitter',serif;font-weight:700;color:var(--gold);font-size:15px;margin-bottom:3px}
.ft .sb{font-size:12px;color:rgba(250,246,239,.3)}
.ft .cp{font-size:10px;color:rgba(250,246,239,.1);margin-top:12px}

@media(min-width:640px){
  .hdr{padding:0 24px}.hero{padding:28px 24px 36px}.hero h1{font-size:28px}
  .fcard{margin:0 24px;margin-top:-16px;padding:20px}.fgrid{grid-template-columns:repeat(3,1fr)}
  .tabs{margin:0 24px}.panel{padding:20px 24px}
  .contact-row{gap:10px}.cbtn{padding:12px 20px}
  .ft{padding:36px 24px}
}
@media(min-width:1024px){
  .mbtn{display:none}
  .dnav{display:flex;align-items:center;gap:4px}
  .dnav a{padding:8px 14px;color:var(--cream2);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid transparent;transition:all .2s}
  .dnav a:hover{color:var(--gold);border-color:rgba(200,153,60,.3)}
  .dnav .bd{margin-left:10px;padding:8px 16px;background:rgba(200,153,60,.1);color:var(--gold);border-radius:8px;border-bottom:0}
  .hero{padding:32px 24px 40px}.hero h1{font-size:34px}
  .fgrid{grid-template-columns:repeat(6,1fr)}
  .hdr>*,.hero,.fcard,.tabs,.panel,.ft>div{max-width:1200px;margin-left:auto;margin-right:auto}
}
</style>
</head>
<body>

<header class="hdr">
  <a href="index.html" class="logo"><div class="logo-box"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg></div><div class="logo-t">ARENA <span>NETWORK</span></div></a>
  <nav class="dnav"><a href="index.html">Arenas</a><a href="calendar.html">Calendar</a><a href="vendor.html">Vendors</a><a href="dashboard/dashboard.html" class="bd">Dashboard</a></nav>
  <button class="mbtn" id="mb" aria-label="Menu"><i></i><i></i><i></i></button>
</header>
<nav class="mnav" id="mn"><a href="index.html">Arenas</a><a href="calendar.html">Calendar</a><a href="vendor.html">Vendors</a><a href="dashboard/dashboard.html">Dashboard</a></nav>

<div id="loadState" class="loading">Loading arena...</div>
<div id="errState" class="error" style="display:none">
  <h2>Arena not found</h2>
  <p>This arena may have been removed or the link is incorrect.</p>
  <a href="index.html"><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>Back to Directory</a>
</div>

<div id="content" style="display:none">
  <section class="hero" id="heroSection"></section>
  <div class="fcard" id="facilityCard"></div>
  <div class="tabs" id="tabBar"></div>
  <div id="panels"></div>
</div>

<footer class="ft"><div class="br">Arena Network</div><div class="sb">League of Agricultural &amp; Equine Centers</div><div class="cp">&copy; 2026 Arena Network</div></footer>

<script>
document.getElementById('mb').onclick=function(){document.getElementById('mn').classList.toggle('open')};

var D=null;
(async function(){
  var id=new URLSearchParams(window.location.search).get('id')||new URLSearchParams(window.location.search).get('slug');
  if(!id){err();return}
  try{
    var r=await fetch('/api/arenas?slug='+encodeURIComponent(id));
    if(!r.ok){err();return}
    D=await r.json();
    if(D.error||!D.name){err();return}
    document.getElementById('pt').textContent=D.name+' — Arena Network';
    render();
  }catch(e){err()}
})();

function err(){document.getElementById('loadState').style.display='none';document.getElementById('errState').style.display='block'}

function render(){
  document.getElementById('loadState').style.display='none';
  document.getElementById('content').style.display='block';
  var a=D;

  // Hero
  var h='<a href="index.html" class="back"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>Arena Directory</a>';
  h+='<h1>'+E(a.name)+(a.is_verified?'<span class="vbadge"><svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.403 12.652a3 3 0 0 0 0-5.304 3 3 0 0 0-3.75-3.751 3 3 0 0 0-5.305 0 3 3 0 0 0-3.751 3.75 3 3 0 0 0 0 5.305 3 3 0 0 0 3.75 3.751 3 3 0 0 0 5.305 0 3 3 0 0 0 3.751-3.75Zm-2.546-4.46a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd"/></svg>Verified</span>':'')+'</h1>';
  h+='<div class="loc"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 0 1 15 0Z"/></svg>'+(a.address||((a.city||'')+(a.city&&a.state?', ':'')+(a.state||'')))+'</div>';
  var tp=cap(a.arena_type||'equine');
  var dc={equine:'var(--sage)',rodeo:'var(--rust)','multi-use':'var(--slate)',fairgrounds:'#8B6E4E',agricultural:'var(--gold)'}[a.arena_type]||'var(--sage)';
  h+='<div class="pill"><span class="dot" style="background:'+dc+'"></span>'+tp+'</div>';
  // Contact buttons
  h+='<div class="contact-row">';
  if(a.website)h+='<a href="'+E(a.website)+'" target="_blank" class="cbtn cbtn-g"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M13.19 8.688a4.5 4.5 0 0 1 1.242 7.244l-4.5 4.5a4.5 4.5 0 0 1-6.364-6.364l1.757-1.757m13.35-.622 1.757-1.757a4.5 4.5 0 0 0-6.364-6.364l-4.5 4.5a4.5 4.5 0 0 0 1.242 7.244"/></svg>Website</a>';
  if(a.phone)h+='<a href="tel:'+E(a.phone)+'" class="cbtn cbtn-w"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z"/></svg>'+E(a.phone)+'</a>';
  if(a.email)h+='<a href="mailto:'+E(a.email)+'" class="cbtn cbtn-w"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/></svg>Email</a>';
  h+='</div>';
  document.getElementById('heroSection').innerHTML=h;

  // Facility
  var fc='<h2>Facility</h2><div class="fgrid">';
  var items=[
    [(parseInt(a.indoor_arenas)||0)+(parseInt(a.outdoor_arenas)||0),'Arenas'],
    [a.indoor_arenas||0,'Indoor'],[a.outdoor_arenas||0,'Outdoor'],
    [a.stall_count?a.stall_count.toLocaleString():'—','Stalls'],
    [a.rv_spaces?a.rv_spaces.toLocaleString():'—','RV Spaces'],
    [a.seating_capacity?a.seating_capacity.toLocaleString():'—','Seats']
  ];
  items.forEach(function(x){fc+='<div class="fbox"><div class="v">'+x[0]+'</div><div class="l">'+x[1]+'</div></div>'});
  fc+='</div>';
  if(a.surface_type)fc+='<div style="margin-top:10px;font-size:12px;color:rgba(11,29,58,.35)"><strong>Surface:</strong> '+E(a.surface_type)+'</div>';
  if(a.description)fc+='<div class="desc">'+E(a.description)+'</div>';
  document.getElementById('facilityCard').innerHTML=fc;

  // Tabs
  var evts=a.upcoming_events||[],vnds=a.vendors||[],spns=a.sponsors||[],news=a.news||[];
  var tabs=[['events','Events',evts.length],['vendors','Vendors',vnds.length],['sponsors','Sponsors',spns.length],['news','News',news.length]];
  document.getElementById('tabBar').innerHTML=tabs.map(function(t,i){
    return '<button class="tab'+(i===0?' on':'')+'" data-t="'+t[0]+'" onclick="sw(this)">'+t[1]+' <span style="color:rgba(11,29,58,.2);margin-left:4px">'+t[2]+'</span></button>';
  }).join('');

  // Panels
  var p='';
  // Events
  p+='<div class="panel on" id="p-events">';
  if(!evts.length)p+='<div class="empty-tab">No upcoming events</div>';
  else evts.forEach(function(e){
    var d=e.start_date?new Date(e.start_date+'T00:00:00'):'';
    var ds=d?d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
    var ed=e.end_date?new Date(e.end_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
    var tc={rodeo:'etag-rodeo','horse show':'etag-show',futurity:'etag-futurity',roping:'etag-roping',expo:'etag-expo',fair:'etag-fair'}[e.event_type]||'etag-show';
    p+='<div class="ecard"><h3>'+E(e.title)+'</h3><div class="meta">'+ds+(ed?' — '+ed:'')+'</div>';
    if(e.promoter)p+='<div class="meta">'+E(e.promoter)+'</div>';
    if(e.discipline)p+='<span class="etag '+tc+'">'+E(e.discipline)+'</span>';
    p+='</div>';
  });
  p+='</div>';

  // Vendors
  p+='<div class="panel" id="p-vendors">';
  if(!vnds.length)p+='<div class="empty-tab">No vendors listed</div>';
  else vnds.forEach(function(v){
    p+='<div class="vcard"><h3>'+E(v.vendor_name)+'</h3>';
    if(v.booth_location)p+='<div class="sub">'+E(v.booth_location)+'</div>';
    if(v.contact_email)p+='<div class="sub">'+E(v.contact_email)+'</div>';
    if(v.category)p+='<span class="cat">'+E(v.category)+'</span>';
    if(v.website)p+=' <a href="'+E(v.website)+'" target="_blank" style="font-size:12px;color:var(--gold);font-weight:600;margin-left:8px">Website →</a>';
    p+='</div>';
  });
  p+='</div>';

  // Sponsors
  p+='<div class="panel" id="p-sponsors">';
  if(!spns.length)p+='<div class="empty-tab">No sponsors listed</div>';
  else spns.forEach(function(s){
    p+='<div class="vcard"><h3>'+E(s.sponsor_name)+'</h3>';
    if(s.sponsor_level)p+='<span class="cat">'+E(s.sponsor_level)+'</span>';
    if(s.website)p+=' <a href="'+E(s.website)+'" target="_blank" style="font-size:12px;color:var(--gold);font-weight:600;margin-left:8px">Website →</a>';
    p+='</div>';
  });
  p+='</div>';

  // News
  p+='<div class="panel" id="p-news">';
  if(!news.length)p+='<div class="empty-tab">No news articles</div>';
  else news.forEach(function(n){
    var d=n.publish_date?new Date(n.publish_date+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'';
    p+='<div class="ncard"><h3>'+E(n.title)+'</h3><div class="date">'+d+'</div><p>'+E(n.body||'')+'</p></div>';
  });
  p+='</div>';

  document.getElementById('panels').innerHTML=p;
}

function sw(btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')});
  btn.classList.add('on');
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on')});
  document.getElementById('p-'+btn.dataset.t).classList.add('on');
}

function cap(s){return s?s.split('-').map(function(w){return w.charAt(0).toUpperCase()+w.slice(1)}).join('-'):''}
function E(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
</script>
</body>
</html>
