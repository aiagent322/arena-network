<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Calendar — Arena Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0B1D3A;--gold:#C8993C;--cream:#FAF6EF;--cream2:#F2EBE0;--cream3:#E8DFD0;--rust:#9B4D2B;--sage:#5A7247;--slate:#3C5A8A;--white:#FFF;--r:10px}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cream);color:var(--navy);-webkit-text-size-adjust:100%}
h1,h2,h3{font-family:'Bitter',Georgia,serif}
a{text-decoration:none;color:inherit}

.hdr{position:sticky;top:0;z-index:50;background:var(--navy);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px}
.logo-box{width:32px;height:32px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-box svg{width:18px;height:18px;stroke:var(--navy);fill:none;stroke-width:2.2}
.logo-t{font-family:'Bitter',serif;font-weight:800;font-size:15px;color:var(--gold);letter-spacing:.04em}
.logo-t span{color:var(--cream2);font-weight:600}
.mbtn{width:48px;height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:0;border:0;cursor:pointer}
.mbtn i{display:block;width:22px;height:2px;background:var(--gold);border-radius:2px}
.dnav{display:none}
.mnav{max-height:0;overflow:hidden;transition:max-height .3s;background:var(--navy);padding:0 16px}
.mnav.open{max-height:300px}
.mnav a{display:block;padding:14px 12px;color:var(--cream2);font-weight:600;font-size:14px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid rgba(200,153,60,.08)}
.mnav a.on{color:var(--gold)}

.hero{background:var(--navy);padding:24px 16px 32px;text-align:center}
.hero-tag{color:var(--gold);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.15em;margin-bottom:8px}
.hero h1{color:var(--cream);font-size:24px;font-weight:800;line-height:1.25;margin-bottom:6px}
.hero p{color:rgba(250,246,239,.5);font-size:14px}

/* Month nav — phone: stacked center */
.monthnav{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;flex-wrap:wrap}
.monthnav h2{font-size:18px;font-weight:700;min-width:180px;text-align:center}
.mbtn2{min-height:48px;min-width:48px;padding:12px 16px;border:1px solid var(--cream3);border-radius:var(--r);background:var(--white);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:rgba(11,29,58,.5)}
.mbtn2:active{background:var(--cream)}

/* Filters stacked on phone */
.cfilters{padding:0 16px 12px;display:flex;flex-direction:column;gap:8px}
.cfin{width:100%;padding:12px;font-size:14px;border:1px solid var(--cream3);border-radius:var(--r);background:var(--white);color:var(--navy);font-family:inherit;-webkit-appearance:none;appearance:none}
select.cfin{background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%228%22%3E%3Cpath d=%221 1l5 5 5-5%22 stroke=%22%230B1D3A%22 stroke-width=%221.5%22 fill=%22none%22/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}

/* Calendar grid: HIDDEN on phone, visible on desktop only */
.calgrid{display:none}

/* Event list: phone primary view */
.elist{padding:0 16px 32px}
.eitem{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--cream2)}
.edate{width:48px;text-align:center;flex-shrink:0}
.edate .mo{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--gold);letter-spacing:.06em}
.edate .dy{font-family:'Bitter',serif;font-size:22px;font-weight:800;color:var(--navy);line-height:1}
.einfo{flex:1;min-width:0}
.einfo h3{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:3px}
.einfo .venue{font-size:12px;color:rgba(11,29,58,.4)}
.einfo .disc{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;background:var(--cream);color:rgba(11,29,58,.4);margin-top:4px}
.empty-list{text-align:center;padding:48px 16px;color:rgba(11,29,58,.2);font-size:13px}

.ft{background:var(--navy);padding:28px 16px;text-align:center}
.ft .br{font-family:'Bitter',serif;font-weight:700;color:var(--gold);font-size:15px;margin-bottom:3px}
.ft .sb{font-size:12px;color:rgba(250,246,239,.3)}
.ft .cp{font-size:10px;color:rgba(250,246,239,.1);margin-top:12px}

@media(min-width:640px){
  .hdr{padding:0 24px}.hero{padding:32px 24px 36px}.hero h1{font-size:28px}
  .monthnav{padding:16px 24px}.cfilters{padding:0 24px 12px;flex-direction:row}
  .cfilters>*{flex:1}
  .elist{padding:0 24px 32px}
}
@media(min-width:1024px){
  .mbtn{display:none}
  .dnav{display:flex;align-items:center;gap:4px}
  .dnav a{padding:8px 14px;color:var(--cream2);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid transparent;transition:all .2s}
  .dnav a:hover{color:var(--gold);border-color:rgba(200,153,60,.3)}
  .dnav a.on{color:var(--gold);border-color:var(--gold)}
  .dnav .bd{margin-left:10px;padding:8px 16px;background:rgba(200,153,60,.1);color:var(--gold);border-radius:8px;border-bottom:0}
  .hero h1{font-size:34px}
  .calgrid{display:block;margin:0 24px 24px;background:var(--white);border-radius:var(--r);border:1px solid var(--cream3);overflow:hidden}
  .cghead{display:grid;grid-template-columns:repeat(7,1fr)}
  .cghead div{background:var(--navy);color:var(--gold);text-align:center;padding:8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
  .cgbody{display:grid;grid-template-columns:repeat(7,1fr)}
  .cgcell{min-height:80px;padding:6px;border-bottom:1px solid var(--cream2);border-right:1px solid var(--cream2);font-size:11px}
  .cgcell .dn{font-weight:700;color:rgba(11,29,58,.4);margin-bottom:4px}
  .cgcell.today .dn{color:var(--gold);font-weight:800}
  .cgcell.out{background:rgba(232,223,208,.3)}
  .cgchip{display:block;padding:2px 4px;border-radius:3px;font-size:9px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cgchip-rodeo{background:rgba(155,77,43,.1);color:var(--rust)}
  .cgchip-show{background:rgba(90,114,71,.1);color:var(--sage)}
  .cgchip-other{background:rgba(200,153,60,.1);color:var(--gold)}
  .hdr>*,.hero>div,.monthnav,.cfilters,.calgrid,.elist,.ft>div{max-width:1200px;margin-left:auto;margin-right:auto}
}
</style>
</head>
<body>

<header class="hdr">
  <a href="index.html" class="logo"><div class="logo-box"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg></div><div class="logo-t">ARENA <span>NETWORK</span></div></a>
  <nav class="dnav"><a href="index.html">Arenas</a><a href="calendar.html" class="on">Calendar</a><a href="vendor.html">Vendors</a><a href="dashboard/dashboard.html" class="bd">Dashboard</a></nav>
  <button class="mbtn" id="mb" aria-label="Menu"><i></i><i></i><i></i></button>
</header>
<nav class="mnav" id="mn"><a href="index.html">Arenas</a><a href="calendar.html" class="on">Calendar</a><a href="vendor.html">Vendors</a><a href="dashboard/dashboard.html">Dashboard</a></nav>

<section class="hero"><div class="hero-tag">League of Agricultural &amp; Equine Centers</div><h1>Event Calendar</h1><p>Rodeos, horse shows, futurities, and agricultural events nationwide.</p></section>

<div class="monthnav">
  <button class="mbtn2" onclick="chg(-1)">&larr; Prev</button>
  <h2 id="mlbl"></h2>
  <button class="mbtn2" onclick="chg(1)">Next &rarr;</button>
  <button class="mbtn2" onclick="today()">Today</button>
</div>

<div class="cfilters">
  <select id="fSt" class="cfin" onchange="filt()"><option value="">All States</option></select>
  <select id="fDisc" class="cfin" onchange="filt()"><option value="">All Disciplines</option></select>
</div>

<div class="calgrid" id="cg"></div>
<div class="elist" id="el"></div>

<footer class="ft"><div class="br">Arena Network</div><div class="sb">League of Agricultural &amp; Equine Centers</div><div class="cp">&copy; 2026 Arena Network</div></footer>

<script>
document.getElementById('mb').onclick=function(){document.getElementById('mn').classList.toggle('open')};

var MO=['January','February','March','April','May','June','July','August','September','October','November','December'];
var DY=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var cY,cM,allE=[],filtE=[],FP=false;

(function(){var n=new Date();cY=n.getFullYear();cM=n.getMonth();loadM()})();

function chg(d){cM+=d;if(cM>11){cM=0;cY++}if(cM<0){cM=11;cY--}loadM()}
function today(){var n=new Date();cY=n.getFullYear();cM=n.getMonth();loadM()}

async function loadM(){
  document.getElementById('mlbl').textContent=MO[cM]+' '+cY;
  var f=new Date(cY,cM,1),l=new Date(cY,cM+1,0);
  var sp=new Date(f);sp.setDate(sp.getDate()-f.getDay());
  var ep=new Date(l);ep.setDate(ep.getDate()+(6-l.getDay()));
  var ss=ds(sp),es=ds(ep);
  try{
    var r=await fetch('/api/events?start='+ss+'&end='+es+'&approved=true&limit=500');
    var d=await r.json();allE=d.events||[];
    if(!FP)popF(allE);
    filt();
  }catch(e){allE=[];filtE=[];renderList();renderGrid()}
}

function filt(){
  var st=document.getElementById('fSt').value;
  var dc=document.getElementById('fDisc').value;
  filtE=allE.filter(function(e){
    if(st&&e.arena_state!==st)return false;
    if(dc&&e.discipline!==dc)return false;
    return true;
  });
  renderList();renderGrid();
}

function renderList(){
  var el=document.getElementById('el');
  if(!filtE.length){el.innerHTML='<div class="empty-list">No events this month</div>';return}
  var sorted=filtE.slice().sort(function(a,b){return a.start_date.localeCompare(b.start_date)});
  el.innerHTML=sorted.map(function(e){
    var d=new Date(e.start_date+'T00:00:00');
    var venue=e.arena_name||'';
    var loc=e.arena_city?(e.arena_city+(e.arena_state?', '+e.arena_state:'')):'';
    var venueHtml=venue;
    if(venue&&e.arena_slug) venueHtml='<a href="arena.html?id='+E(e.arena_slug)+'" style="color:var(--gold);font-weight:600">'+E(venue)+'</a>';
    else if(venue) venueHtml=E(venue);
    return '<div class="eitem">'+
      '<div class="edate"><div class="mo">'+MO[d.getMonth()].substring(0,3)+'</div><div class="dy">'+d.getDate()+'</div></div>'+
      '<div class="einfo"><h3>'+E(e.title)+'</h3>'+
      '<div class="venue">'+venueHtml+(loc?' — '+E(loc):'')+'</div>'+
      (e.discipline?'<span class="disc">'+E(e.discipline)+'</span>':'')+
      '</div></div>';
  }).join('');
}

function renderGrid(){
  var cg=document.getElementById('cg');
  if(!cg)return;
  var f=new Date(cY,cM,1),l=new Date(cY,cM+1,0);
  var off=f.getDay(),days=l.getDate();
  var td=new Date();td.setHours(0,0,0,0);
  var h='<div class="cghead">';DY.forEach(function(d){h+='<div>'+d+'</div>'});h+='</div><div class="cgbody">';
  var prev=new Date(cY,cM,0).getDate();
  for(var i=off-1;i>=0;i--)h+='<div class="cgcell out"><div class="dn">'+(prev-i)+'</div></div>';
  for(var d=1;d<=days;d++){
    var dt=new Date(cY,cM,d);var dstr=ds(dt);
    var isT=dt.getTime()===td.getTime();
    var evs=filtE.filter(function(e){return e.start_date<=dstr&&(e.end_date||e.start_date)>=dstr});
    h+='<div class="cgcell'+(isT?' today':'')+'"><div class="dn">'+d+'</div>';
    evs.slice(0,3).forEach(function(e){
      var cc=e.event_type==='rodeo'?'cgchip-rodeo':e.event_type==='horse show'?'cgchip-show':'cgchip-other';
      h+='<div class="cgchip '+cc+'">'+E(e.title)+'</div>';
    });
    if(evs.length>3)h+='<div style="font-size:8px;color:rgba(11,29,58,.25)">+'+(evs.length-3)+' more</div>';
    h+='</div>';
  }
  var rem=7-((off+days)%7);if(rem<7)for(var i=1;i<=rem;i++)h+='<div class="cgcell out"><div class="dn">'+i+'</div></div>';
  h+='</div>';cg.innerHTML=h;
}

function popF(evts){
  var sts={},dcs={};
  evts.forEach(function(e){if(e.arena_state)sts[e.arena_state]=1;if(e.discipline)dcs[e.discipline]=1});
  var s1=document.getElementById('fSt');Object.keys(sts).sort().forEach(function(s){var o=document.createElement('option');o.value=s;o.textContent=s;s1.appendChild(o)});
  var s2=document.getElementById('fDisc');Object.keys(dcs).sort().forEach(function(d){var o=document.createElement('option');o.value=d;o.textContent=cap(d);s2.appendChild(o)});
  FP=true;
}

function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function cap(s){return s?s.split(/[\s-]+/).map(function(w){return w.charAt(0).toUpperCase()+w.slice(1)}).join(' '):''}
function E(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
</script>
</body>
</html>
